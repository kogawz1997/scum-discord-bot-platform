const fmtTime = (date) => {
  if (!date) return '—';
  const d = date instanceof Date ? date : new Date(date);
  const diff = (NOW - d) / 60000;
  if (diff < 1) return 'just now';
  if (diff < 60) return `${Math.floor(diff)}m ago`;
  if (diff < 1440) return `${Math.floor(diff/60)}h ago`;
  return `${Math.floor(diff/1440)}d ago`;
};
const fmtAbs = (date) => {
  if (!date) return '—';
  const d = date instanceof Date ? date : new Date(date);

};

const buildFleet = () => {
  const out = [];
  TENANTS.forEach(t => {
    out.push({
      id:`rt_del_${t.id}`, tenantId:t.id, tenantName:t.name,
      kind:'delivery', scope:'execute_only',
      ...t.delivery,
      latestVersion:'1.8.2',
      capabilities:['delivery_jobs','in_game_announce'],
    });
    out.push({
      id:`rt_bot_${t.id}`, tenantId:t.id, tenantName:t.name,
      kind:'server_bot', scope:'sync_only',
      ...t.serverBot,
      latestVersion:'1.8.2',
      capabilities:['log_sync','config_apply','backup','restart'],
    });
  });
  return out;
};

const Badge = ({ tone='default', children, style, icon }) => {
  const tones = {
    default:{bg:'rgba(148,163,184,0.12)',fg:'#cbd5e1',bd:'rgba(148,163,184,0.22)'},
    ok:{bg:'var(--ok-bg)',fg:'#86efac',bd:'var(--ok-border)'},
    warn:{bg:'var(--warn-bg)',fg:'#fbbf24',bd:'var(--warn-border)'},
    danger:{bg:'var(--danger-bg)',fg:'#fca5a5',bd:'var(--danger-border)'},
    critical:{bg:'var(--critical-bg)',fg:'#fca5a5',bd:'rgba(220,38,38,0.5)'},
    info:{bg:'var(--info-bg)',fg:'#93c5fd',bd:'var(--info-border)'},
    delivery:{bg:'var(--delivery-bg)',fg:'#7dd3fc',bd:'var(--delivery-border)'},
    serverbot:{bg:'var(--serverbot-bg)',fg:'#c4b5fd',bd:'var(--serverbot-border)'},
    muted:{bg:'rgba(100,116,139,0.12)',fg:'var(--text-3)',bd:'rgba(100,116,139,0.22)'},
    neutral:{bg:'rgba(56,66,96,0.5)',fg:'#cbd5e1',bd:'var(--border)'},
  };
  const t = tones[tone]||tones.default;
  return <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 7px',background:t.bg,color:t.fg,border:`1px solid ${t.bd}`,borderRadius:4,fontSize:11,fontWeight:500,letterSpacing:0.1,whiteSpace:'nowrap',...style}}>{icon && <Icon name={icon} size={10}/>}{children}</span>;
};

const StatusDot = ({ status }) => {
  const c = { online:'var(--ok)', offline:'var(--danger)', degraded:'var(--warn)', pending:'var(--text-3)', past_due:'var(--warn)', unpaid:'var(--danger)', paid:'var(--ok)' }[status] || 'var(--text-3)';
  const pulse = status==='online' || status==='degraded';
  return <span style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:c,boxShadow:pulse?`0 0 0 3px ${c}22`:'none',flexShrink:0}}/>;
};

const Btn = ({ variant='ghost', size='sm', icon, children, onClick, disabled, style, title, danger, ...rest }) => {
  const sizes = { xs:{h:24,px:8,fs:11}, sm:{h:28,px:10,fs:12}, md:{h:34,px:14,fs:13} };
  const s = sizes[size];
  const variants = {
    primary:{bg:'var(--accent)',fg:'var(--accent-ink)',bd:'var(--accent)',hover:'#2dd4bf'},
    secondary:{bg:'var(--bg-surface-3)',fg:'var(--text)',bd:'var(--border-strong)',hover:'var(--bg-hover)'},
    ghost:{bg:'transparent',fg:'var(--text-2)',bd:'var(--border)',hover:'var(--bg-surface-2)'},
    danger:{bg:'var(--danger)',fg:'#fff',bd:'var(--danger)',hover:'#dc2626'},
    dangerGhost:{bg:'transparent',fg:'#fca5a5',bd:'var(--danger-border)',hover:'var(--danger-bg)'},
  };
  const v = variants[danger?'dangerGhost':variant]||variants.ghost;
  const [hover,setHover] = useState(false);
  return <button title={title} onClick={onClick} disabled={disabled} onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)} style={{height:s.h,padding:`0 ${s.px}px`,fontSize:s.fs,fontWeight:500,background:hover&&!disabled?v.hover:v.bg,color:v.fg,border:`1px solid ${v.bd}`,borderRadius:6,cursor:disabled?'not-allowed':'pointer',opacity:disabled?0.5:1,display:'inline-flex',alignItems:'center',gap:6,whiteSpace:'nowrap',transition:'all 0.1s',...style}} {...rest}>
    {icon && <Icon name={icon} size={s.fs+1}/>}
    {children}
  </button>;
};

const Card = ({ children, style, title, actions, pad=true }) => (
  <div style={{background:'var(--bg-surface)',border:'1px solid var(--border)',borderRadius:'var(--r-md)',...style}}>
    {title && <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 14px',borderBottom:'1px solid var(--border)'}}>
      <div style={{fontSize:12,fontWeight:600,color:'var(--text-2)',letterSpacing:0.3,textTransform:'uppercase'}}>{title}</div>
      {actions}
    </div>}
    <div style={{padding:pad?(title?'14px':'14px'):0}}>{children}</div>
  </div>
);

const MetricCard = ({ label, value, delta, tone='default', sub, onClick }) => {
  const toneBorder = { critical:'var(--critical-bg)', danger:'var(--danger-border)', warn:'var(--warn-border)', ok:'var(--ok-border)', info:'var(--info-border)', default:'var(--border)' }[tone];
  const toneBg = tone==='default' ? 'var(--bg-surface)' : {critical:'linear-gradient(180deg, rgba(220,38,38,0.08), transparent)', danger:'linear-gradient(180deg, rgba(239,68,68,0.06), transparent)', warn:'linear-gradient(180deg, rgba(245,158,11,0.06), transparent)', ok:'linear-gradient(180deg, rgba(34,197,94,0.06), transparent)', info:'linear-gradient(180deg, rgba(96,165,250,0.06), transparent)'}[tone];
  return <div onClick={onClick} style={{background:toneBg,backgroundColor:'var(--bg-surface)',border:`1px solid ${toneBorder}`,borderRadius:'var(--r-md)',padding:'12px 14px',cursor:onClick?'pointer':'default',minWidth:0,transition:'border-color 0.15s'}} onMouseEnter={e=>onClick && (e.currentTarget.style.borderColor='var(--border-strong)')} onMouseLeave={e=>onClick && (e.currentTarget.style.borderColor=toneBorder)}>
    <div style={{fontSize:11,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:0.5,fontWeight:500,marginBottom:6}}>{label}</div>
    <div style={{display:'flex',alignItems:'baseline',gap:8}}>
      <div style={{fontSize:24,fontWeight:600,fontVariantNumeric:'tabular-nums',color:tone==='critical'||tone==='danger'?'#fca5a5':tone==='warn'?'#fbbf24':tone==='ok'?'#86efac':'var(--text)'}}>{value}</div>
      {delta && <div style={{fontSize:11,color:'var(--text-3)'}}>{delta}</div>}
    </div>
    {sub && <div style={{fontSize:11,color:'var(--text-3)',marginTop:4}}>{sub}</div>}
  </div>;
};

const Table = ({ columns, rows, onRowClick, dense=false, emptyText='No data' }) => {
  return <div style={{overflow:'auto'}}>
    <table style={{width:'100%',borderCollapse:'collapse',fontSize:12,fontVariantNumeric:'tabular-nums'}}>
      <thead>
        <tr>
          {columns.map((c,i) => <th key={i} style={{textAlign:c.align||'left',padding:'8px 12px',background:'var(--bg-table-head)',borderBottom:'1px solid var(--border)',borderTop:'1px solid var(--border)',color:'var(--text-3)',fontWeight:500,fontSize:11,textTransform:'uppercase',letterSpacing:0.5,whiteSpace:'nowrap',width:c.width,position:'sticky',top:0,zIndex:1}}>{c.header}</th>)}
        </tr>
      </thead>
      <tbody>
        {rows.length===0 && <tr><td colSpan={columns.length} style={{padding:'32px',textAlign:'center',color:'var(--text-3)'}}>{emptyText}</td></tr>}
        {rows.map((r,ri) => <tr key={ri} onClick={onRowClick?(e)=>onRowClick(r,e):undefined} style={{cursor:onRowClick?'pointer':'default',borderBottom:'1px solid var(--border-subtle)'}} onMouseEnter={e=>e.currentTarget.style.background='var(--bg-hover)'} onMouseLeave={e=>e.currentTarget.style.background=''}>
          {columns.map((c,ci) => <td key={ci} style={{padding:dense?'6px 12px':'9px 12px',textAlign:c.align||'left',color:'var(--text-2)',verticalAlign:'middle'}}>{c.render ? c.render(r) : r[c.key]}</td>)}
        </tr>)}
      </tbody>
    </table>
  </div>;
};

// Modal with risk confirmation
const Modal = ({ open, onClose, title, children, maxWidth=540, footer, risk }) => {
  useEffect(()=>{
    if(!open) return;
    const onKey = (e) => { if (e.key==='Escape') onClose(); };
    window.addEventListener('keydown',onKey);
    return ()=>window.removeEventListener('keydown',onKey);
  },[open,onClose]);
  if(!open) return null;
  const riskTone = { high:'var(--warn-border)', critical:'var(--critical-bg)' }[risk];
  return <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(5,10,24,0.7)',backdropFilter:'blur(4px)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:20,animation:'fadeIn 0.15s ease'}}>
    <div onClick={e=>e.stopPropagation()} style={{background:'var(--bg-surface)',border:`1px solid ${riskTone||'var(--border-strong)'}`,borderRadius:10,maxWidth,width:'100%',boxShadow:'var(--shadow-pop)',maxHeight:'90vh',display:'flex',flexDirection:'column',animation:'pop 0.18s cubic-bezier(0.2,0.9,0.3,1.2)'}}>
      {risk && <div style={{padding:'8px 16px',fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:0.8,color:risk==='critical'?'#fca5a5':'#fbbf24',background:risk==='critical'?'var(--critical-bg)':'var(--warn-bg)',borderBottom:`1px solid ${riskTone}`,borderRadius:'10px 10px 0 0',display:'flex',alignItems:'center',gap:6}}><Icon name="alert" size={12}/>{risk==='critical'?'Confirm critical action':'Confirm high-risk action'}</div>}
      <div style={{padding:'16px 20px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{fontSize:15,fontWeight:600}}>{title}</div>
        <button onClick={onClose} style={{background:'none',border:0,color:'var(--text-3)',cursor:'pointer',padding:4,display:'flex'}}><Icon name="x" size={16}/></button>
      </div>
      <div style={{padding:'16px 20px',overflow:'auto',flex:1}}>{children}</div>
      {footer && <div style={{padding:'12px 20px',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'flex-end',gap:8,background:'var(--bg-surface-2)',borderRadius:'0 0 10px 10px'}}>{footer}</div>}
    </div>
    <style>{`@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes pop{from{opacity:0;transform:translateY(8px) scale(0.98)}to{opacity:1;transform:none}}`}</style>
  </div>;
};

const TextInput = ({ value, onChange, placeholder, icon, style, size='sm', ...rest }) => {
  const sizes = { sm:{h:28,fs:12}, md:{h:34,fs:13} };
  const s = sizes[size];
  return <div style={{position:'relative',display:'flex',alignItems:'center',...style}}>
    {icon && <Icon name={icon} size={13} style={{position:'absolute',left:9,color:'var(--text-3)',pointerEvents:'none'}}/>}
    <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} {...rest} style={{height:s.h,paddingLeft:icon?28:10,paddingRight:10,fontSize:s.fs,width:'100%',background:'var(--bg-surface-2)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontFamily:'inherit',outline:'none'}} onFocus={e=>e.target.style.borderColor='var(--accent)'} onBlur={e=>e.target.style.borderColor='var(--border)'}/>
  </div>;
};

const Select = ({ value, onChange, options, style, size='sm' }) => {
  const sizes = { sm:{h:28,fs:12}, md:{h:34,fs:13} };
  const s = sizes[size];
  return <select value={value} onChange={e=>onChange(e.target.value)} style={{height:s.h,padding:'0 24px 0 10px',fontSize:s.fs,background:'var(--bg-surface-2)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontFamily:'inherit',cursor:'pointer',appearance:'none',backgroundImage:"url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2.5' stroke-linecap='round'><polyline points='6 9 12 15 18 9'/></svg>\")",backgroundRepeat:'no-repeat',backgroundPosition:'right 8px center',outline:'none',...style}}>
    {options.map(o => typeof o==='string' ? <option key={o} value={o}>{o}</option> : <option key={o.value} value={o.value}>{o.label}</option>)}
  </select>;
};

// Delivery vs Server Bot visual separator
const RuntimeTag = ({ kind, size='sm' }) => {
  const isDelivery = kind==='delivery';
  const tone = isDelivery ? 'delivery' : 'serverbot';
  const label = isDelivery ? 'Delivery / Execute' : 'Server / Sync';
  const ic = isDelivery ? 'truck' : 'server';
  return <Badge tone={tone} icon={ic}>{label}</Badge>;
};

const RiskBadge = ({ level }) => {
  if(!level || level==='none') return <span style={{color:'var(--text-3)'}}>—</span>;
  const tones = { low:'muted', medium:'warn', high:'danger', critical:'critical' };
  return <Badge tone={tones[level]}>{level.toUpperCase()}</Badge>;
};

const StatusBadge = ({ status, icon }) => {
  const map = {
    online:{t:'ok',l:'Online'},
    offline:{t:'danger',l:'Offline'},
    degraded:{t:'warn',l:'Degraded'},
    pending:{t:'muted',l:'Pending'},
    active:{t:'ok',l:'Active'},
    paid:{t:'ok',l:'Paid'},
    unpaid:{t:'danger',l:'Unpaid'},
    past_due:{t:'warn',l:'Past Due'},
    trial:{t:'info',l:'Trial'},
    preview:{t:'info',l:'Preview'},
    suspended:{t:'muted',l:'Suspended'},
    cancelled:{t:'muted',l:'Cancelled'},
    failed:{t:'danger',l:'Failed'},
    blocked:{t:'warn',l:'Blocked'},
    dead_letter:{t:'critical',l:'Dead-letter'},
    none:{t:'muted',l:'—'},
  };
  const m = map[status]||{t:'muted',l:status};
  return <Badge tone={m.t} icon={icon}>{m.l}</Badge>;
};

Object.assign(window, { Icon, Badge, StatusDot, Btn, Card, MetricCard, Table, Modal, TextInput, Select, RuntimeTag, RiskBadge, StatusBadge });

// Tenants list with filters
const Tenants = ({ onNav, initialFilter }) => {
  const [q, setQ] = useState('');
  const [status, setStatus] = useState('all');
  const [pkg, setPkg] = useState('all');
  const [risk, setRisk] = useState(initialFilter?.riskFilter || 'all');
  const [rtFilter, setRtFilter] = useState('all');

  const rows = useMemo(() => {
    return window.TENANTS.filter(t => {
      if (q && !(t.name.toLowerCase().includes(q.toLowerCase()) || t.slug.includes(q.toLowerCase()))) return false;
      if (status !== 'all' && t.status !== status) return false;
      if (pkg !== 'all' && t.pkg !== pkg) return false;
      if (risk !== 'all' && t.risk.level !== risk) return false;
      if (rtFilter === 'delivery_offline' && t.delivery.status !== 'offline') return false;
      if (rtFilter === 'bot_offline' && t.serverBot.status !== 'offline') return false;
      return true;
    });
  }, [q, status, pkg, risk, rtFilter]);

  const clearAll = () => { setQ(''); setStatus('all'); setPkg('all'); setRisk('all'); setRtFilter('all'); };
  const activeFilterCount = [status,pkg,risk,rtFilter].filter(v=>v!=='all').length + (q?1:0);

  return <div>
    <PageHeader
      title="Tenants"
      subtitle="Manage tenant status, packages, billing posture, and runtime readiness. Click any row to open tenant dossier."
      actions={<>
        <Btn size="sm" icon="refresh" variant="ghost">Refresh</Btn>
        <Btn size="sm" icon="plus" variant="primary">Create tenant</Btn>
      </>}
    />
    <div style={{padding:'14px 24px',borderBottom:'1px solid var(--border)',background:'var(--bg-surface)',display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
      <TextInput icon="search" value={q} onChange={setQ} placeholder="Search name, slug, email…" style={{width:260}}/>
      <Select value={status} onChange={setStatus} options={[{value:'all',label:'All statuses'},{value:'active',label:'Active'},{value:'preview',label:'Preview'},{value:'suspended',label:'Suspended'}]}/>
      <Select value={pkg} onChange={setPkg} options={[{value:'all',label:'All packages'},...window.PACKAGES.map(p=>({value:p.name,label:p.name}))]}/>
      <Select value={risk} onChange={setRisk} options={[{value:'all',label:'Any risk'},{value:'low',label:'Low'},{value:'medium',label:'Medium'},{value:'high',label:'High'},{value:'critical',label:'Critical'}]}/>
      <Select value={rtFilter} onChange={setRtFilter} options={[{value:'all',label:'Any runtime'},{value:'delivery_offline',label:'Delivery offline'},{value:'bot_offline',label:'Server Bot offline'}]}/>
      {activeFilterCount>0 && <Btn size="sm" icon="x" onClick={clearAll}>Clear ({activeFilterCount})</Btn>}
      <div style={{flex:1}}/>
      <span style={{fontSize:11,color:'var(--text-3)'}}>Showing <b style={{color:'var(--text)'}}>{rows.length}</b> of {window.TENANTS.length}</span>
    </div>

    <div style={{padding:'0 24px 24px'}}>
      <div style={{background:'var(--bg-surface)',border:'1px solid var(--border)',borderRadius:8,overflow:'hidden',marginTop:16}}>
        <Table
          onRowClick={(t)=>onNav('tenant-detail',{tenantId:t.id})}
          columns={[
            { header:'Tenant', render: t => <div style={{display:'flex',alignItems:'center',gap:10}}>
              <StatusDot status={t.status==='active'?'online':t.status==='suspended'?'offline':'pending'}/>
              <div><div style={{fontWeight:500,color:'var(--text)'}}>{t.name}</div><div className="mono" style={{fontSize:10.5,color:'var(--text-muted)'}}>{t.slug} · {t.locale.toUpperCase()}</div></div>
            </div>},
            { header:'Status', render: t => <StatusBadge status={t.status}/> },
            { header:'Package', render: t => <Badge tone={t.pkg==='Enterprise'?'info':t.pkg==='Pro'?'ok':'muted'} icon="pkg">{t.pkg}</Badge> },
            { header:'Subscription', render: t => <div><StatusBadge status={t.sub.status==='active'?'active':t.sub.status==='past_due'?'past_due':t.sub.status==='trial'?'trial':t.sub.status==='cancelled'?'cancelled':'none'}/><div style={{fontSize:10.5,color:'var(--text-3)',marginTop:2}}>{t.sub.renewsAt?`renew ${t.sub.renewsAt}`:t.sub.trialEnd?`trial → ${t.sub.trialEnd}`:'—'}</div></div> },

    </div>
  </div>;

const RuntimePanel = ({ t, kind, onRotate }) => {
  const rt = kind==='delivery' ? t.delivery : t.serverBot;
  const isDel = kind==='delivery';
  const tone = isDel ? 'delivery' : 'serverbot';
  const color = isDel ? 'var(--delivery)' : 'var(--serverbot)';
  const title = isDel ? 'Delivery Agent' : 'Server Bot';
  const capabilities = isDel ? ['Delivery jobs','In-game announce'] : ['Log sync','Config apply','Backup','Restart control'];
  const restrictions = isDel ? ['Cannot edit config','Cannot restart server','Cannot create backup'] : ['Cannot deliver items','Cannot announce in-game'];

  return <div style={{background:'var(--bg-surface)',border:`1px solid ${color}33`,borderRadius:10,overflow:'hidden'}}>
    <div style={{padding:'12px 16px',borderBottom:`1px solid ${color}22`,background:`linear-gradient(180deg, ${isDel?'rgba(56,189,248,0.06)':'rgba(167,139,250,0.06)'}, transparent)`,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:32,height:32,borderRadius:8,background:isDel?'var(--delivery-bg)':'var(--serverbot-bg)',display:'flex',alignItems:'center',justifyContent:'center',color:color}}>
          <Icon name={isDel?'truck':'server'} size={16}/>
        </div>
        <div>
          <div style={{fontSize:13,fontWeight:600}}>{title}</div>
          <div style={{fontSize:10.5,color:color,textTransform:'uppercase',letterSpacing:0.8,fontWeight:600}}>{isDel?'execute_only':'sync_only'}</div>
        </div>
      </div>
      <StatusBadge status={rt.status}/>
    </div>
    <div style={{padding:16}}>
      {rt.status==='pending' ? <div style={{textAlign:'center',padding:'16px 0'}}>
        <div style={{fontSize:12,color:'var(--text-3)',marginBottom:12}}>No runtime activated yet</div>
        <Btn size="sm" icon="plus" variant="primary">Generate setup token</Btn>
      </div> : <div>
        <div style={{display:'grid',gridTemplateColumns:'80px 1fr',gap:'8px 12px',fontSize:12,marginBottom:14}}>
          <div style={{color:'var(--text-3)'}}>Runtime ID</div><div className="mono" style={{color:'var(--text-2)'}}>rt_{kind.replace('_','')}_{t.id.slice(2)}</div>
          <div style={{color:'var(--text-3)'}}>Machine</div><div className="mono" style={{color:'var(--text-2)'}}>{rt.machine || '—'}</div>
          <div style={{color:'var(--text-3)'}}>Version</div><div className="mono" style={{color:'var(--text-2)'}}>{rt.version} {rt.version!=='1.8.2' && rt.version!=='—' && <Badge tone="warn" style={{marginLeft:6}}>outdated</Badge>}</div>
          <div style={{color:'var(--text-3)'}}>Last heartbeat</div><div style={{color:rt.status==='offline'?'#fca5a5':'var(--text-2)'}}>{rt.lastSeen?window.fmtTime(rt.lastSeen):'—'} {rt.lastSeen && <span style={{color:'var(--text-muted)',fontSize:10}}>({window.fmtAbs(rt.lastSeen)})</span>}</div>
          <div style={{color:'var(--text-3)'}}>Credential</div><div style={{color:'var(--text-2)'}}><Badge tone="ok" icon="lock">active</Badge></div>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:10.5,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:0.5,marginBottom:6,fontWeight:600}}>Capabilities</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:4}}>{capabilities.map(c => <Badge key={c} tone={tone} icon="check">{c}</Badge>)}</div>
        </div>
        <div style={{marginBottom:14,opacity:0.6}}>
          <div style={{fontSize:10.5,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:0.5,marginBottom:6,fontWeight:600}}>Cannot do</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:4}}>{restrictions.map(c => <Badge key={c} tone="muted" icon="lock">{c}</Badge>)}</div>
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          <Btn size="xs" variant="secondary">View logs</Btn>
          <Btn size="xs" variant="secondary">Heartbeat history</Btn>
          <Btn size="xs" danger onClick={onRotate}>Rotate credential</Btn>
          <Btn size="xs" danger>Revoke</Btn>
        </div>
      </div>}
    </div>
  </div>;
};

const RestartTab = ({ t, onConfirm }) => {
  const blocked = t.serverBot.status !== 'online';
  const scheduleRestart = () => onConfirm({
    title:`Schedule safe restart for ${t.name}?`, risk:'high',
    body:<>
      <div style={{fontSize:12.5,color:'var(--text-2)',lineHeight:1.5,marginBottom:12}}>This will trigger countdown announcements through the Delivery Agent, then execute the restart via Server Bot, then verify health.</div>
      <div style={{background:'var(--bg-surface-2)',border:'1px solid var(--border)',borderRadius:6,padding:12}}>
        <div style={{fontSize:11,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:0.5,fontWeight:600,marginBottom:8}}>Readiness check</div>
        <div style={{display:'flex',flexDirection:'column',gap:6,fontSize:12}}>
          <div style={{display:'flex',justifyContent:'space-between'}}>Delivery Agent ready <Badge tone={t.delivery.status==='online'?'ok':'warn'} icon={t.delivery.status==='online'?'check':'alert'}>{t.delivery.status==='online'?'yes':'announce may fail'}</Badge></div>
          <div style={{display:'flex',justifyContent:'space-between'}}>Server Bot ready <Badge tone={t.serverBot.status==='online'?'ok':'danger'} icon={t.serverBot.status==='online'?'check':'x'}>{t.serverBot.status==='online'?'yes':'BLOCKED'}</Badge></div>
          <div style={{display:'flex',justifyContent:'space-between'}}>Active queue <Badge tone="muted">none</Badge></div>
        </div>

    {blocked && <div style={{background:'var(--danger-bg)',border:'1px solid var(--danger-border)',borderRadius:6,padding:'10px 14px',marginBottom:14,display:'flex',alignItems:'center',gap:10,fontSize:12.5}}>

      <Table
        columns={[
          { header:'Plan', render: r => <span className="mono">{r.id}</span>},
          { header:'Type', render: r => <Badge tone="info">{r.type}</Badge>},
          { header:'Scheduled', render: r => r.at},
          { header:'Delivery', render: r => <Badge tone={t.delivery.status==='online'?'ok':'warn'}>{t.delivery.status==='online'?'ready':'offline'}</Badge>},

          { header:'Status', render: r => <StatusBadge status={r.status}/>},
        ]}
        rows={[
          {id:'restart_01', type:'safe_restart', at:'11:00 today', status:blocked?'blocked':'pending'},

      />

  </div>;
};

  const checks = [
    { k:'Tenant exists', s:'pass' },
    { k:'Subscription active', s: t.sub.status==='active'?'pass':t.sub.status==='past_due'?'fail':'pass' },
    { k:'Package valid', s:'pass' },
    { k:'Delivery Agent online', s: t.delivery.status==='online'?'pass':'fail', msg: t.delivery.status!=='online'?'Last heartbeat '+window.fmtTime(t.delivery.lastSeen)+' ago':null },
    { k:'Server Bot online', s: t.serverBot.status==='online'?'pass':'fail', msg: t.serverBot.status!=='online'?'Last heartbeat was 109 minutes ago':null, rec: t.serverBot.status!=='online'?'Open runtime detail':null },
    { k:'Last heartbeat fresh', s: t.serverBot.status==='online'?'pass':'fail' },
    { k:'Config jobs healthy', s: window.JOBS.filter(j=>j.tenantId===t.id&&j.type.startsWith('config')&&j.status==='failed').length>0?'fail':'pass' },
    { k:'Restart jobs healthy', s: t.serverBot.status==='online'?'pass':'warn' },

  return <div>
    <div style={{display:'flex',alignItems:'center',gap:14,background:'var(--bg-surface)',border:'1px solid var(--border)',borderRadius:8,padding:'12px 16px',marginBottom:14}}>
      <div style={{width:44,height:44,borderRadius:10,background:failing?'var(--danger-bg)':'var(--ok-bg)',display:'flex',alignItems:'center',justifyContent:'center',color:failing?'#fca5a5':'#86efac'}}>
        <Icon name={failing?'alert':'check'} size={20}/>

  <PageHeader title="Security Events" subtitle="Setup token usage, auth anomalies, credential events."/>
  <div style={{padding:24}}>
    <Card pad={false}>
      <Table
        columns={[
          {header:'Time',render:s=><span style={{color:'var(--text-3)'}}>{window.fmtTime(s.at)}</span>},
          {header:'Event',render:s=>s.type},
          {header:'Severity',render:s=><RiskBadge level={s.severity}/>},
          {header:'Tenant',render:s=>{const t=window.TENANTS.find(x=>x.id===s.tenantId);return t?.name||'—';}},
          {header:'Source IP',render:s=><span className="mono">{s.ip}</span>},
          {header:'',render:()=><div style={{display:'flex',gap:4,justifyContent:'flex-end'}}><Btn size="xs">Investigate</Btn></div>},
        ]}
        rows={window.SECURITY}
      />
    </Card>
  </div>
</div>;

const Incidents = () => <div>
  <PageHeader title="Incidents" subtitle="Platform-wide issues affecting multiple tenants or core services."/>
  <div style={{padding:24}}>
    <Card pad={false}>
      <Table
        columns={[
          {header:'Incident',render:i=><div><div style={{fontWeight:500}}>{i.title}</div><div className="mono" style={{fontSize:11,color:'var(--text-3)'}}>{i.id}</div></div>},
          {header:'Severity',render:i=><RiskBadge level={i.severity}/>},
          {header:'Status',render:i=><Badge tone={i.status==='investigating'?'warn':'info'}>{i.status}</Badge>},
          {header:'Started',render:i=><span style={{color:'var(--text-3)'}}>{window.fmtTime(i.startedAt)}</span>},
          {header:'',render:()=><Btn size="xs">View</Btn>},
        ]}
        rows={window.INCIDENTS}
      />
    </Card>
  </div>
</div>;

const Packages = () => <div>
  <PageHeader title="Packages" subtitle="Subscription tiers available to tenants." actions={<Btn size="sm" icon="plus" variant="primary">New package</Btn>}/>
  <div style={{padding:24,display:'grid',gridTemplateColumns:'repeat(auto-fit, minmax(220px, 1fr))',gap:12}}>
    {window.PACKAGES.map(p => <div key={p.id} style={{background:'var(--bg-surface)',border:'1px solid var(--border)',borderRadius:8,padding:16}}>
      <div style={{fontSize:11,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:0.6,fontWeight:600,marginBottom:4}}>{p.name}</div>
      <div style={{fontSize:22,fontWeight:600,marginBottom:6}}>฿{p.price.toLocaleString()}<span style={{fontSize:11,color:'var(--text-3)',fontWeight:400}}> /mo</span></div>
      <div style={{fontSize:11.5,color:'var(--text-3)',marginBottom:10}}>{p.tenants} tenant{p.tenants>1?'s':''} subscribed</div>
      <div style={{display:'flex',gap:6}}><Btn size="xs">Edit</Btn><Btn size="xs">View tenants</Btn></div>
    </div>)}
  </div>
</div>;

const Placeholder = ({ label }) => <div>
  <PageHeader title={label} subtitle="This screen follows the same pattern as the others — filters, metric row, primary table, detail drawer."/>
  <div style={{padding:40,textAlign:'center',color:'var(--text-3)'}}>
    <div style={{fontSize:13,marginBottom:6}}>{label} screen — wireframe only in this prototype.</div>
    <div style={{fontSize:11.5}}>Navigate to Overview, Tenants, Runtime Health, or Agents & Bots to see fully rendered screens.</div>
  </div>
</div>;

// ---------- Root ----------

const App = () => {
  const [route, setRoute] = useState(() => {
    try { return JSON.parse(localStorage.getItem('ownerRoute')) || { page:'overview', params:{} }; }
    catch { return { page:'overview', params:{} }; }
  });
  const [confirmCfg, setConfirmCfg] = useState(null);
  const [confirmOpen, setConfirmOpen] = useState(false);
  const [confirmResolve, setConfirmResolve] = useState(() => ()=>{});

  useEffect(() => { localStorage.setItem('ownerRoute', JSON.stringify(route)); }, [route]);

  const nav = (page, params={}) => setRoute({ page, params });

  const openConfirm = (cfg) => {
    setConfirmCfg(cfg);
    setConfirmOpen(true);
  };

  const screens = {
    overview: <Overview onNav={nav}/>,
    tenants: <Tenants onNav={nav}/>,
    'tenant-detail': <TenantDetail tenantId={route.params.tenantId} onNav={nav} onConfirm={openConfirm}/>,
    runtime: <Runtime onNav={nav}/>,
    agents: <Agents onNav={nav}/>,
    billing: <Billing onNav={nav}/>,
    jobs: <Jobs onNav={nav}/>,
    audit: <Audit/>,
    security: <Security/>,
    incidents: <Incidents/>,
    packages: <Packages/>,
    subscriptions: <Placeholder label="Subscriptions"/>,
    config: <Placeholder label="Config Jobs"/>,
    restart: <Placeholder label="Restart Plans"/>,
    backups: <Placeholder label="Backups"/>,
    support: <Placeholder label="Support"/>,
    diagnostics: <Placeholder label="Diagnostics"/>,
    access: <Placeholder label="Access Control"/>,
    settings: <Placeholder label="Settings"/>,
  };

  const currentNav = route.page === 'tenant-detail' ? 'tenants' : route.page;

  return <div style={{display:'flex',minHeight:'100vh'}}>
    <Sidebar current={currentNav} onNav={nav}/>
    <div style={{flex:1,minWidth:0,display:'flex',flexDirection:'column'}}>
      <TopBar onNav={nav}/>
      <main style={{flex:1}}>{screens[route.page] || <Placeholder label="Not found"/>}</main>
    </div>
    <RiskConfirmModal open={confirmOpen} onClose={()=>setConfirmOpen(false)} cfg={confirmCfg} onConfirm={()=>{}}/>
  </div>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);


</script>
</body>
</html>
