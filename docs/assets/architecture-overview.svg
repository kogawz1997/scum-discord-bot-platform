<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">SCUM TH Platform Architecture Overview</title>
  <desc id="desc">Static architecture map showing the three web surfaces, control plane services, game-side runtimes, and PostgreSQL.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c0f"/>
      <stop offset="100%" stop-color="#0f1517"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111818"/>
      <stop offset="100%" stop-color="#171f1e"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#151d1c"/>
      <stop offset="100%" stop-color="#1a2322"/>
    </linearGradient>
    <linearGradient id="focus" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c6a85f"/>
      <stop offset="100%" stop-color="#e5cb82"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#8ea9a3"/>
    </marker>
    <marker id="arrowSoft" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#c6a85f"/>
    </marker>
    <style>
      .bg { fill: url(#bg); }
      .frame { fill: #0d1313; stroke: #25302e; stroke-width: 2; rx: 28; }
      .panel { fill: url(#panel); stroke: #2d3937; stroke-width: 2; rx: 24; }
      .card { fill: url(#card); stroke: #33403e; stroke-width: 2; rx: 20; filter: url(#shadow); }
      .card-soft { fill: #182120; stroke: #44504d; stroke-width: 2; rx: 20; }
      .db { fill: #172220; stroke: #d0b06a; stroke-width: 2.5; rx: 26; filter: url(#shadow); }
      .line { stroke: #7f9791; stroke-width: 3.5; fill: none; marker-end: url(#arrow); }
      .line-soft { stroke: #c6a85f; stroke-width: 3.5; fill: none; marker-end: url(#arrowSoft); }
      .eyebrow { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #c6a85f; letter-spacing: 1.8px; text-transform: uppercase; }
      .title { font: 700 38px 'Segoe UI', Arial, sans-serif; fill: #f3efe2; }
      .subtitle { font: 400 17px 'Segoe UI', Arial, sans-serif; fill: #aab8b2; }
      .section { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #f2eee1; }
      .label { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #fbf8ef; }
      .body { font: 400 15px 'Segoe UI', Arial, sans-serif; fill: #ced7d3; }
      .small { font: 400 13px 'Segoe UI', Arial, sans-serif; fill: #91a09b; }
      .pill { fill: #27312f; stroke: #465350; stroke-width: 1.5; rx: 999; }
      .pill-hot { fill: #2e2718; stroke: #c6a85f; stroke-width: 1.5; rx: 999; }
      .pill-text { font: 700 11px 'Segoe UI', Arial, sans-serif; fill: #ecf2ee; letter-spacing: 0.5px; }
      .bullet { fill: #c6a85f; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="980"/>
  <rect class="frame" x="26" y="26" width="1548" height="928"/>

  <text class="eyebrow" x="70" y="92">SCUM TH PLATFORM</text>
  <text class="title" x="70" y="138">Architecture Overview</text>
  <text class="subtitle" x="70" y="170">Repository-aligned runtime map for GitHub, docs, and technical reviews.</text>

  <rect class="pill-hot" x="1240" y="74" width="134" height="32"/>
  <text class="pill-text" x="1270" y="95">OWNER / TENANT</text>
  <rect class="pill" x="1388" y="74" width="112" height="32"/>
  <text class="pill-text" x="1417" y="95">PLAYER</text>

  <rect class="panel" x="58" y="214" width="290" height="646"/>
  <text class="section" x="86" y="256">Web Surfaces</text>
  <text class="small" x="86" y="282">Role-separated entry points for operators and players</text>

  <rect class="card" x="82" y="318" width="242" height="132"/>
  <text class="label" x="106" y="360">Owner Panel</text>
  <text class="body" x="106" y="390">Platform oversight, quotas, packages,</text>
  <text class="body" x="106" y="412">runtime health, incidents, audit.</text>
  <rect class="pill-hot" x="106" y="428" width="96" height="28"/>
  <text class="pill-text" x="133" y="447">/owner</text>

  <rect class="card" x="82" y="472" width="242" height="132"/>
  <text class="label" x="106" y="514">Tenant Panel</text>
  <text class="body" x="106" y="544">Daily server operations, delivery,</text>
  <text class="body" x="106" y="566">players, config, diagnostics.</text>
  <rect class="pill-hot" x="106" y="582" width="98" height="28"/>
  <text class="pill-text" x="134" y="601">/tenant</text>

  <rect class="card" x="82" y="626" width="242" height="132"/>
  <text class="label" x="106" y="668">Player Portal</text>
  <text class="body" x="106" y="698">Wallet, shop, orders, delivery,</text>
  <text class="body" x="106" y="720">stats, profile, community flow.</text>
  <rect class="pill" x="106" y="736" width="98" height="28"/>
  <text class="pill-text" x="136" y="755">/player</text>

  <rect class="panel" x="392" y="214" width="530" height="646"/>
  <text class="section" x="420" y="256">Control Plane</text>
  <text class="small" x="420" y="282">The shared core that owns auth, data, routing, orchestration, and monitoring</text>

  <rect class="card" x="420" y="318" width="220" height="140"/>
  <text class="label" x="446" y="360">Discord Bot</text>
  <text class="body" x="446" y="390">Gateway, commands, alerts,</text>
  <text class="body" x="446" y="412">admin web mount, webhook entry.</text>
  <text class="small" x="446" y="438">src/bot.js</text>

  <rect class="card" x="664" y="318" width="230" height="140"/>
  <text class="label" x="690" y="360">Admin API</text>
  <text class="body" x="690" y="390">Auth, RBAC, control plane routes,</text>
  <text class="body" x="690" y="412">config, restore, diagnostics.</text>
  <text class="small" x="690" y="438">src/admin/api/ + runtime/</text>

  <rect class="card" x="420" y="496" width="220" height="140"/>
  <text class="label" x="446" y="538">Player / Public API</text>
  <text class="body" x="446" y="568">Signup, preview, wallet, shop,</text>
  <text class="body" x="446" y="590">orders, profile, player flows.</text>
  <text class="small" x="446" y="616">apps/web-portal-standalone/api/</text>

  <rect class="card" x="664" y="496" width="230" height="140"/>
  <text class="label" x="690" y="538">Worker</text>
  <text class="body" x="690" y="568">Queue processing, delivery jobs,</text>
  <text class="body" x="690" y="590">background operations, retries.</text>
  <text class="small" x="690" y="616">src/worker.js</text>

  <rect class="card-soft" x="420" y="674" width="474" height="144"/>
  <text class="label" x="446" y="716">Monitoring / Audit / Notifications</text>
  <circle class="bullet" cx="452" cy="748" r="4"/>
  <text class="body" x="466" y="754">request logs, runtime health, security events, restore state</text>
  <circle class="bullet" cx="452" cy="778" r="4"/>
  <text class="body" x="466" y="784">admin snapshots, diagnostics bundles, support context</text>
  <circle class="bullet" cx="452" cy="808" r="4"/>
  <text class="body" x="466" y="814">package gating, quota signals, incident-oriented visibility</text>

  <rect class="db" x="970" y="382" width="262" height="184"/>
  <text class="eyebrow" x="1002" y="428">DATA LAYER</text>
  <text class="label" x="1002" y="470">PostgreSQL + Prisma</text>
  <text class="body" x="1002" y="504">schema-per-tenant runtime topology</text>
  <text class="body" x="1002" y="530">control plane, commerce, player, audit,</text>
  <text class="body" x="1002" y="552">delivery, sync, and operational state</text>

  <rect class="panel" x="1270" y="214" width="272" height="646"/>
  <text class="section" x="1298" y="256">Game-side Runtime</text>
  <text class="small" x="1298" y="282">Separated by responsibility, not treated as one generic agent</text>

  <rect class="card" x="1294" y="318" width="224" height="160"/>
  <text class="label" x="1320" y="360">Server Bot / Watcher</text>
  <text class="body" x="1320" y="392">Reads SCUM.log, forwards sync events,</text>
  <text class="body" x="1320" y="414">supports diagnostics and server-side flow.</text>
  <text class="small" x="1320" y="442">apps/watcher/server.js</text>
  <rect class="pill" x="1320" y="450" width="118" height="28"/>
  <text class="pill-text" x="1348" y="469">READ / SYNC</text>

  <rect class="card" x="1294" y="522" width="224" height="186"/>
  <text class="label" x="1320" y="564">Delivery Agent</text>
  <text class="body" x="1320" y="596">Receives delivery jobs, executes in game,</text>
  <text class="body" x="1320" y="618">reports results, can send announce.</text>
  <text class="small" x="1320" y="646">apps/agent/server.js</text>
  <rect class="pill-hot" x="1320" y="654" width="126" height="28"/>
  <text class="pill-text" x="1348" y="673">WRITE / EXECUTE</text>

  <rect class="card-soft" x="1058" y="648" width="174" height="116"/>
  <text class="section" x="1086" y="688">SCUM Runtime</text>
  <text class="body" x="1086" y="718">SCUM.log</text>
  <text class="body" x="1086" y="742">SCUM Client / Window</text>

  <path class="line" d="M324 384 C360 384, 366 384, 420 384"/>
  <path class="line" d="M324 538 C360 538, 366 548, 420 548"/>
  <path class="line" d="M324 692 C360 692, 366 532, 664 532"/>
  <path class="line-soft" d="M640 384 C650 384, 654 384, 664 384"/>
  <path class="line-soft" d="M894 384 C930 384, 936 430, 970 458"/>
  <path class="line-soft" d="M640 548 C770 548, 790 548, 970 500"/>
  <path class="line-soft" d="M894 548 C930 548, 944 534, 970 530"/>
  <path class="line" d="M1232 470 C1250 470, 1260 430, 1294 430"/>
  <path class="line" d="M1232 536 C1258 536, 1268 618, 1294 618"/>
  <path class="line-soft" d="M894 748 C1020 748, 1040 748, 1058 742"/>
  <path class="line-soft" d="M1518 618 C1540 618, 1540 618, 1550 618"/>
  <path class="line-soft" d="M1294 430 C1258 430, 1246 710, 1232 710"/>
  <path class="line-soft" d="M1294 618 C1262 618, 1250 734, 1232 734"/>

  <text class="small" x="70" y="908">Designed for GitHub docs, README previews, and repository-grounded architecture reviews.</text>
  <text class="small" x="70" y="930">Key distinction: Server Bot handles read/sync and server-side flow, while Delivery Agent handles execute/in-game delivery.</text>
</svg>
