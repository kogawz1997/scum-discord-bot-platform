<body class="surface-body surface-tenant" data-surface="tenant-v4">

    <header class="surface-globalbar">
      <div class="surface-globalbar-main">
        <a class="surface-brand" href="/tenant">
          <span class="surface-brand-mark">SCUM</span>
          <span class="surface-brand-copy">
            <span class="surface-brand-eyebrow" data-i18n="shell.tenant.eyebrow">Tenant Admin</span>

          </span>
        </a>
        <nav class="surface-role-switch" aria-label="Surface switch">

      </div>
    </header>

    </main>

  <script>
    window.AdminUiI18n?.init(['tenantLanguageSelect']);
    const applyTenantShellLocale = () => {
      if (!window.AdminUiI18n) return;
      document.title = window.AdminUiI18n.t('shell.tenant.documentTitle', document.title);
      window.AdminUiI18n.apply(document);
    };
    applyTenantShellLocale();
    window.addEventListener('ui-language-change', applyTenantShellLocale);
  </script>
