<body class="surface-body surface-owner" data-surface="owner-v4">
  <div class="surface-app">
    <header class="surface-globalbar">
      <div class="surface-globalbar-main">
        <a class="surface-brand" href="/owner">
          <span class="surface-brand-mark">SCUM</span>
          <span class="surface-brand-copy">
            <span class="surface-brand-eyebrow" data-i18n="shell.owner.eyebrow">Owner</span>
            <strong class="surface-brand-title" data-i18n="shell.owner.title">Platform control plane</strong>
            <span class="surface-brand-detail" data-i18n="shell.owner.detail">Monitor tenants, packages, revenue, runtime posture, and active incidents from one surface</span>
          </span>
        </a>
        <nav class="surface-role-switch" aria-label="Owner navigation">
          <a class="surface-role-link" href="/owner" data-i18n="shell.owner.homeNav">Overview</a>
          <a class="surface-role-link" href="/owner/tenants" data-i18n="shell.owner.tenantsNav">Tenants</a>
          <a class="surface-role-link" href="/owner/runtime" data-i18n="shell.owner.runtimeNav">Runtime</a>
        </nav>
      </div>
      <div class="surface-globalbar-tools">
        <span id="ownerV4Status" class="surface-status" data-tone="muted" data-i18n="shell.owner.status.loading">Preparing Owner workspace</span>
        <div class="surface-tool-cluster">
          <select id="ownerLanguageSelect" class="surface-select" aria-label="Language"></select>
          <a class="surface-button" href="/owner/tenants" data-i18n="shell.owner.openTenantList">Open tenant list</a>
          <button id="ownerV4RefreshBtn" class="surface-button surface-button-primary" type="button" data-i18n="shell.common.refresh">Refresh</button>
        </div>
      </div>
    </header>
    <main class="surface-stage">
      <div id="ownerV4AppRoot" class="surface-mount" aria-live="polite"></div>
    </main>
  </div>
  <script src="/admin/assets/admin-i18n.js?v=20260418-owner-i18n-5"></script>
  <script>
    window.AdminUiI18n?.init(['ownerLanguageSelect']);
    const applyOwnerShellLocale = () => {
      if (!window.AdminUiI18n) return;
      document.title = window.AdminUiI18n.t('shell.owner.documentTitle', document.title);
      window.AdminUiI18n.apply(document);
    };
    applyOwnerShellLocale();
    window.addEventListener('ui-language-change', applyOwnerShellLocale);
  </script>
