<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ทางเข้าแอดมิน SCUM</title>
  <style>
    :root {
      --bg: #090c09;
      --bg-soft: #121712;
      --panel: rgba(16, 20, 17, 0.94);
      --panel-soft: rgba(20, 26, 21, 0.9);
      --line: rgba(208, 214, 176, 0.14);
      --line-strong: rgba(232, 236, 206, 0.24);
      --text: #f0eee6;
      --muted: #b6b09d;
      --accent: #d5bf79;
      --accent-strong: #f0da8f;
      --danger: #ca7d6d;
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --shadow: 0 28px 78px rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      color: var(--text);
      color-scheme: dark;
      font-family: "IBM Plex Sans Thai", "Segoe UI", sans-serif;
      background:
        linear-gradient(180deg, rgba(5, 6, 5, 0.8), rgba(5, 6, 5, 0.92)),
        radial-gradient(circle at 14% 16%, rgba(213, 191, 121, 0.09), transparent 28%),
        radial-gradient(circle at 84% 78%, rgba(114, 131, 92, 0.08), transparent 34%),
        url("/admin/assets/visuals/scum/bg-dark-texture.jpg") center/cover no-repeat,
        linear-gradient(180deg, #080b08, #111611 58%, #161d16);
    }

    body {
      min-height: 100vh;
      padding: 20px;
    }

    select,
    input,
    button {
      font: inherit;
    }

    select,
    select option,
    select optgroup {
      color-scheme: dark;
    }

    select option,
    select optgroup {
      background: #151713 !important;
      color: #f4f1e8 !important;
    }

    select option:checked,
    select option:hover,
    select option:focus {
      background: #7c6331 !important;
      color: #ffffff !important;
    }

    .admin-login-shell {
      width: min(1360px, calc(100% - 8px));
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .topbar,
    .login-stage,
    .auth-panel,
    .visual-panel,
    .surface-card {
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0.012)),
        var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .topbar {
      min-height: 76px;
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: center;
      flex-wrap: wrap;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: inherit;
    }

    .brand-mark {
      min-width: 54px;
      min-height: 54px;
      border-radius: 18px;
      border: 1px solid rgba(240, 218, 143, 0.22);
      background: linear-gradient(180deg, rgba(240, 218, 143, 0.2), rgba(105, 88, 42, 0.26));
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff2c5;
    }

    .brand-copy {
      display: grid;
      gap: 4px;
    }

    .brand-copy strong {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 1.2rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .brand-copy span {
      color: var(--muted);
      font-size: 0.88rem;
    }

    .login-stage {
      display: grid;
      grid-template-columns: minmax(340px, 0.78fr) minmax(420px, 1.22fr);
      overflow: hidden;
    }

    .visual-panel {
      border: 0;
      border-right: 1px solid var(--line);
      border-radius: 0;
      min-height: 700px;
      padding: 28px;
      background:
        linear-gradient(180deg, rgba(9, 12, 9, 0.46), rgba(9, 12, 9, 0.86)),
        linear-gradient(90deg, rgba(9, 12, 9, 0.1), rgba(9, 12, 9, 0.38)),
        url("/admin/assets/visuals/scum/hero-public.jpg") center/cover no-repeat;
      display: block;
    }

    .surface-tag {
      width: fit-content;
      min-height: 30px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--accent);
      display: inline-flex;
      align-items: center;
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .visual-panel h1,
    .auth-panel h2 {
      margin: 0;
      font-family: "Barlow Condensed", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      line-height: 0.9;
    }

    .visual-panel h1 {
      max-width: 8ch;
      font-size: clamp(3rem, 5.4vw, 5.6rem);
    }

    .visual-panel p,
    .auth-panel p,
    .hint,
    label span {
      margin: 0;
      color: var(--muted);
      line-height: 1.68;
    }

    .visual-grid {
      display: grid;
      gap: 12px;
    }

    .surface-card {
      padding: 18px;
      background:
        linear-gradient(180deg, rgba(14, 18, 15, 0.72), rgba(14, 18, 15, 0.84)),
        rgba(14, 18, 15, 0.82);
    }

    .surface-card strong {
      display: block;
      margin-bottom: 6px;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 1.32rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .auth-panel {
      border: 0;
      border-radius: 0;
      padding: 30px;
      display: grid;
      align-content: center;
      gap: 18px;
      background:
        linear-gradient(180deg, rgba(12, 15, 12, 0.92), rgba(15, 19, 15, 0.9)),
        var(--panel-soft);
    }

    .auth-panel h2 {
      font-size: clamp(2.8rem, 5vw, 4.8rem);
    }

    .auth-topline {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
    }

    .surface-switch {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .surface-link {
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: border-color 0.14s ease, background 0.14s ease, color 0.14s ease;
    }

    .surface-link:hover,
    .surface-link.is-active {
      border-color: rgba(240, 218, 143, 0.24);
      background: rgba(240, 218, 143, 0.08);
      color: #fff4cb;
    }

    .language-picker {
      display: grid;
      gap: 6px;
      min-width: 170px;
    }

    .language-picker span {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .language-select,
    input {
      width: 100%;
      min-height: 46px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      padding: 0 14px;
      outline: none;
    }

    input:focus,
    .language-select:focus {
      border-color: rgba(240, 218, 143, 0.34);
      box-shadow: 0 0 0 2px rgba(240, 218, 143, 0.08);
    }

    form {
      display: grid;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 6px;
    }

    button {
      appearance: none;
      width: 100%;
      min-height: 48px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      cursor: pointer;
      transition: transform 0.14s ease, border-color 0.14s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: var(--line-strong);
    }

    #loginBtn {
      border-color: rgba(240, 218, 143, 0.22);
      background: linear-gradient(180deg, rgba(240, 218, 143, 0.96), rgba(186, 151, 74, 0.92));
      color: #181205;
      font-weight: 700;
    }

    #discordSsoBtn {
      display: none;
    }

    .error {
      min-height: 22px;
      color: var(--danger);
      font-weight: 700;
    }

    .auth-context {
      display: grid;
      gap: 10px;
    }

    .route-pill {
      width: fit-content;
      min-height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid rgba(240, 218, 143, 0.18);
      background: rgba(240, 218, 143, 0.06);
      color: #fff1bc;
      display: inline-flex;
      align-items: center;
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .switch-note {
      padding: 12px 14px;
      border: 1px solid rgba(240, 218, 143, 0.12);
      border-radius: 14px;
      background: rgba(240, 218, 143, 0.05);
      color: #f3ead0;
      line-height: 1.6;
    }

    .switch-note[hidden] {
      display: none;
    }

    .source-note {
      max-width: 48ch;
    }

    @media (max-width: 1080px) {
      .topbar,
      .login-stage {
        grid-template-columns: 1fr;
      }

      .visual-panel {
        min-height: 320px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
    }

    @media (max-width: 720px) {
      body {
        padding: 10px;
      }

      .admin-login-shell {
        width: min(100%, calc(100% - 4px));
      }

      .topbar,
      .visual-panel,
      .auth-panel {
        padding: 16px;
      }

      .visual-panel h1 {
        font-size: clamp(2.3rem, 13vw, 3.8rem);
      }

      .auth-panel h2 {
        font-size: clamp(2.2rem, 12vw, 3.8rem);
      }
    }
  </style>
</head>
<body class="admin-login-screen">
  <div class="admin-login-shell">
    <header class="topbar">
      <a class="brand" href="/admin">
        <span class="brand-mark">SCUM</span>
        <span class="brand-copy">
          <strong data-i18n="login.brandTitle">Admin Access</strong>
          <span data-i18n="login.brandSubtitle">Owner and admin consoles</span>
        </span>
      </a>
      <nav class="surface-switch" aria-label="Admin surfaces">
        <a id="ownerLoginRoute" class="surface-link" href="/owner/login" data-i18n="common.roleOwner">Owner</a>
        <a id="tenantLoginRoute" class="surface-link" href="/tenant/login" data-i18n="common.roleAdmin">Admin</a>
      </nav>
    </header>

    <section class="login-stage">
      <aside class="visual-panel" aria-hidden="true"></aside>

      <section class="auth-panel">
        <div class="auth-topline">
          <span id="routePill" class="route-pill" data-i18n="login.enterTitle">ADMIN WEB</span>
          <label class="language-picker">
            <span data-i18n="common.language">Language</span>
            <select id="adminLanguageSelect" class="language-select"></select>
          </label>
        </div>

        <div class="auth-context">
          <h2 id="loginHeading" data-i18n="login.enterTitle">ADMIN WEB</h2>
          <p id="loginSubtitle" data-i18n="login.enterSubtitle">Use your admin account to open the correct console automatically after authentication.</p>
          <p id="switchNotice" class="switch-note" hidden></p>
        </div>

        <form id="loginForm" autocomplete="on">
          <label>
            <span data-i18n="common.username">Username</span>
            <input id="usernameInput" name="username" autocomplete="username" data-i18n-placeholder="login.adminUsernamePlaceholder" required>
          </label>
          <label>
            <span data-i18n="common.password">Password</span>
            <input id="passwordInput" name="password" type="password" autocomplete="current-password" required>
          </label>
          <label>
            <span data-i18n="common.twoFactorOptional">2FA Code (optional)</span>
            <input id="otpInput" name="otp" inputmode="numeric" pattern="\d{6}" maxlength="6" placeholder="123456">
          </label>
          <button id="loginBtn" type="submit" data-i18n="login.signIn">Sign In</button>
        </form>

        <button id="discordSsoBtn" type="button" data-i18n="login.discordSso">Continue with Discord SSO</button>
        <div id="errorText" class="error"></div>

        <p id="sourceHint" class="hint source-note" data-i18n="login.sourceHint">Admin users are read from the database first. Session policy, 2FA, and rate limiting remain enforced after the redesign.</p>
      </section>
    </section>
  </div>

  <script src="/admin/assets/admin-i18n.js?v=20260324-deep-rebuild-3"></script>
  <script>
    const form = document.getElementById('loginForm');
    const usernameInput = document.getElementById('usernameInput');
    const passwordInput = document.getElementById('passwordInput');
    const otpInput = document.getElementById('otpInput');
    const loginBtn = document.getElementById('loginBtn');
    const discordSsoBtn = document.getElementById('discordSsoBtn');
    const errorText = document.getElementById('errorText');
    const sourceHint = document.getElementById('sourceHint');
    const loginHeading = document.getElementById('loginHeading');
    const loginSubtitle = document.getElementById('loginSubtitle');
    const routePill = document.getElementById('routePill');
    const switchNotice = document.getElementById('switchNotice');
    const ownerLoginRoute = document.getElementById('ownerLoginRoute');
    const tenantLoginRoute = document.getElementById('tenantLoginRoute');

    async function api(path, method = 'GET', body = null) {
      const headers = {};
      let payload;
      if (body != null) {
        headers['content-type'] = 'application/json';
        payload = JSON.stringify(body);
      }
      const res = await fetch(path, {
        method,
        headers,
        body: payload,
        credentials: 'same-origin',
      });
      const data = await res.json().catch(() => ({ ok: false, error: 'Invalid response format' }));
      if (!res.ok || data.ok === false) {
        throw new Error(data.error || `Request failed (${res.status})`);
      }
      return data;
    }

    async function ensureNotLoggedIn() {
      if (!document.cookie.split(';').some((entry) => entry.trim().startsWith('scum_admin_session='))) {
        return;
      }
      try {
        const me = await api('/admin/api/me');
        const params = new URLSearchParams(window.location.search);
        const switchMode = String(params.get('switch') || '').trim() === '1';
        const requestedSurface = getRequestedLoginSurface();
        const sessionSurface = me?.data?.tenantId ? 'tenant' : 'owner';
        if (switchMode && requestedSurface !== 'admin' && requestedSurface !== sessionSurface) {
          return;
        }
        window.location.replace(getPostLoginTarget());
      } catch {
        // not logged in
      }
    }

    function getRequestedLoginSurface() {
      const path = String(window.location.pathname || '').trim().toLowerCase();
      if (path === '/owner/login' || path === '/owner/login/') return 'owner';
      if (path === '/tenant/login' || path === '/tenant/login/') return 'tenant';
      return 'admin';
    }

    function getPostLoginTarget() {
      const params = new URLSearchParams(window.location.search);
      const next = String(params.get('next') || '').trim();
      if (next.startsWith('/owner')) return '/owner';
      if (next.startsWith('/tenant')) return '/tenant';
      const path = String(window.location.pathname || '').trim().toLowerCase();
      if (path === '/owner/login' || path === '/owner/login/') return '/owner';
      if (path === '/tenant/login' || path === '/tenant/login/') return '/tenant';
      return '/admin';
    }

    function getSurfaceTargetFromSession(result) {
      const tenantId = result?.data?.tenantId || null;
      return tenantId ? '/tenant' : '/owner';
    }

    function applySurfacePresentation() {
      const requestedSurface = getRequestedLoginSurface();
      const params = new URLSearchParams(window.location.search);
      const switchMode = String(params.get('switch') || '').trim() === '1';
      const t = window.AdminUiI18n?.t || ((key, fallback) => fallback);
      const surfaceContent = {
        owner: {
          pill: t('login.ownerRoutePill', 'Owner Console'),
          heading: t('login.ownerHeading', 'Owner access'),
          subtitle: t('login.ownerSubtitle', 'Use an owner-level admin account for platform health, security, audit, and guarded global changes.'),
          hint: t('login.ownerSourceHint', 'Owner accounts open the platform-wide control surface. Tenant-scoped accounts are redirected to the tenant console after sign-in.'),
          placeholder: t('login.ownerUsernamePlaceholder', 'owner-admin'),
          title: t('login.ownerDocumentTitle', 'SCUM Owner Login'),
        },
        tenant: {
          pill: t('login.tenantRoutePill', 'Tenant Console'),
          heading: t('login.tenantHeading', 'Tenant access'),
          subtitle: t('login.tenantSubtitle', 'Use a tenant-scoped admin account for delivery, wallet support, scoped config, and player operations.'),
          hint: t('login.tenantSourceHint', 'Tenant accounts open the scoped admin surface. Owner accounts are redirected to the owner console after sign-in.'),
          placeholder: t('login.tenantUsernamePlaceholder', 'tenant-admin'),
          title: t('login.tenantDocumentTitle', 'SCUM Tenant Login'),
        },
        admin: {
          pill: t('login.enterTitle', 'ADMIN WEB'),
          heading: t('login.enterTitle', 'ADMIN WEB'),
          subtitle: t('login.enterSubtitle', 'Use your admin account to open the correct console automatically after authentication.'),
          hint: t('login.sourceHint', 'Database-backed admin accounts remain the primary login source. Session, 2FA, and rate limit policy are unchanged.'),
          placeholder: t('login.adminUsernamePlaceholder', 'admin-owner'),
          title: t('login.documentTitle', 'SCUM Admin Access'),
        },
      };
      const current = surfaceContent[requestedSurface] || surfaceContent.admin;
      document.title = current.title;
      routePill.textContent = current.pill;
      loginHeading.textContent = current.heading;
      loginSubtitle.textContent = current.subtitle;
      sourceHint.textContent = current.hint;
      usernameInput.placeholder = current.placeholder;
      ownerLoginRoute.classList.toggle('is-active', requestedSurface === 'owner');
      tenantLoginRoute.classList.toggle('is-active', requestedSurface === 'tenant');
      if (switchMode && requestedSurface === 'tenant') {
        switchNotice.hidden = false;
        switchNotice.textContent = t('login.switchTenant', 'You are switching from an owner session. Sign in with a tenant-scoped account to continue into the tenant console.');
      } else if (switchMode && requestedSurface === 'owner') {
        switchNotice.hidden = false;
        switchNotice.textContent = t('login.switchOwner', 'You are switching from a tenant session. Sign in with an owner-level account to continue into the owner console.');
      } else {
        switchNotice.hidden = true;
        switchNotice.textContent = '';
      }
    }

    async function loadAuthProviders() {
      try {
        const providers = await api('/admin/api/auth/providers', 'GET');
        if (providers?.data?.discordSso) {
          discordSsoBtn.style.display = 'block';
        }
      } catch {
        // ignore
      }
    }

    function showErrorFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const message = String(params.get('error') || '').trim();
      if (message) {
        errorText.textContent = message;
      }
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorText.textContent = '';
      loginBtn.disabled = true;
      const originalText = loginBtn.textContent;
      loginBtn.textContent = window.AdminUiI18n?.t('login.signingIn', 'Signing in...') || 'Signing in...';
      try {
        const result = await api('/admin/api/login', 'POST', {
          username: usernameInput.value.trim(),
          password: passwordInput.value,
          otp: otpInput.value.trim() || undefined,
        });
        const sessionTarget = getSurfaceTargetFromSession(result);
        window.location.replace(sessionTarget);
      } catch (error) {
        errorText.textContent = error.message || (window.AdminUiI18n?.t('login.signInFailed', 'Sign in failed') || 'Sign in failed');
        if (/2FA|OTP/i.test(errorText.textContent)) {
          otpInput.focus();
        } else {
          passwordInput.focus();
        }
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = originalText;
      }
    });

    discordSsoBtn?.addEventListener('click', () => {
      window.location.href = '/admin/auth/discord/start';
    });

    window.AdminUiI18n?.init(['adminLanguageSelect']);
    applySurfacePresentation();
    window.addEventListener('ui-language-change', applySurfacePresentation);
    showErrorFromQuery();
    loadAuthProviders();
    ensureNotLoggedIn();
  </script>
</body>
</html>
