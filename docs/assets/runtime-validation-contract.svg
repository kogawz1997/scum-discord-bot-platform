<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920" role="img" aria-labelledby="title desc">
  <title id="title">SCUM TH Platform Runtime Validation Contract</title>
  <desc id="desc">Static diagram showing how doctor, security, smoke, readiness, and topology checks feed one shared machine-readable validation contract.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c0f"/>
      <stop offset="100%" stop-color="#0f1517"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111818"/>
      <stop offset="100%" stop-color="#171f1e"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#151d1c"/>
      <stop offset="100%" stop-color="#1a2322"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#8ea9a3"/>
    </marker>
    <marker id="arrowHot" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#c6a85f"/>
    </marker>
    <style>
      .bg { fill: url(#bg); }
      .frame { fill: #0d1313; stroke: #25302e; stroke-width: 2; rx: 28; }
      .panel { fill: url(#panel); stroke: #2d3937; stroke-width: 2; rx: 24; }
      .card { fill: url(#card); stroke: #33403e; stroke-width: 2; rx: 20; filter: url(#shadow); }
      .schema { fill: #16211f; stroke: #c6a85f; stroke-width: 2.5; rx: 24; filter: url(#shadow); }
      .line { stroke: #839b95; stroke-width: 3.5; fill: none; marker-end: url(#arrow); }
      .line-hot { stroke: #c6a85f; stroke-width: 3.5; fill: none; marker-end: url(#arrowHot); }
      .eyebrow { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #c6a85f; letter-spacing: 1.8px; text-transform: uppercase; }
      .title { font: 700 38px 'Segoe UI', Arial, sans-serif; fill: #f3efe2; }
      .subtitle { font: 400 17px 'Segoe UI', Arial, sans-serif; fill: #aab8b2; }
      .section { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #f2eee1; }
      .label { font: 700 23px 'Segoe UI', Arial, sans-serif; fill: #fbf8ef; }
      .body { font: 400 15px 'Segoe UI', Arial, sans-serif; fill: #ced7d3; }
      .code { font: 400 15px Consolas, 'Courier New', monospace; fill: #e7dfc7; }
      .small { font: 400 13px 'Segoe UI', Arial, sans-serif; fill: #91a09b; }
      .pill { fill: #27312f; stroke: #465350; stroke-width: 1.5; rx: 999; }
      .pill-hot { fill: #2e2718; stroke: #c6a85f; stroke-width: 1.5; rx: 999; }
      .pill-text { font: 700 11px 'Segoe UI', Arial, sans-serif; fill: #ecf2ee; letter-spacing: 0.5px; }
      .bullet { fill: #c6a85f; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="920"/>
  <rect class="frame" x="26" y="26" width="1548" height="868"/>

  <text class="eyebrow" x="70" y="92">VALIDATION LAYER</text>
  <text class="title" x="70" y="138">Runtime Validation Contract</text>
  <text class="subtitle" x="70" y="170">One machine-readable output model shared by doctor, security, smoke, readiness, and topology checks.</text>

  <rect class="panel" x="58" y="216" width="360" height="616"/>
  <text class="section" x="86" y="258">Validation Commands</text>
  <text class="small" x="86" y="284">These tools keep their normal console output, but also produce a common JSON contract.</text>

  <rect class="card" x="82" y="320" width="312" height="88"/>
  <text class="label" x="108" y="356">doctor</text>
  <text class="body" x="108" y="384">Ports, origins, OAuth, runtime wiring, and operator preflight checks.</text>

  <rect class="card" x="82" y="430" width="312" height="88"/>
  <text class="label" x="108" y="466">security-check</text>
  <text class="body" x="108" y="494">Secret posture, security drift, and hardening requirements.</text>

  <rect class="card" x="82" y="540" width="312" height="88"/>
  <text class="label" x="108" y="576">doctor-topology</text>
  <text class="body" x="108" y="604">Split-runtime overlap, role boundaries, and topology expectations.</text>

  <rect class="card" x="82" y="650" width="312" height="88"/>
  <text class="label" x="108" y="686">smoke:postdeploy</text>
  <text class="body" x="108" y="714">Live runtime and HTTP checks after boot, restart, or deploy.</text>

  <rect class="card" x="82" y="760" width="312" height="48"/>
  <text class="label" x="108" y="792">readiness:prod</text>

  <rect class="panel" x="470" y="216" width="500" height="616"/>
  <text class="section" x="498" y="258">Shared Report Contract</text>
  <text class="small" x="498" y="284">This is the shape used by local tooling, CI summaries, and downstream scripts.</text>

  <rect class="schema" x="498" y="324" width="444" height="340"/>
  <text class="code" x="532" y="370">{</text>
  <text class="code" x="562" y="406">"kind": "smoke" | "doctor" | "topology" | ...</text>
  <text class="code" x="562" y="442">"ok": true | false</text>
  <text class="code" x="562" y="478">"status": "pass" | "warning" | "failed"</text>
  <text class="code" x="562" y="514">"summary": "..."</text>
  <text class="code" x="562" y="550">"checks": [{ "name", "status", "ok", "detail" }]</text>
  <text class="code" x="562" y="586">"warnings": ["..."]</text>
  <text class="code" x="562" y="622">"errors": ["..."]</text>
  <text class="code" x="562" y="658">"data": { ...tool specific payload... }</text>
  <text class="code" x="562" y="694">"generatedAt": "ISO-8601"</text>
  <text class="code" x="532" y="730">}</text>

  <rect class="pill-hot" x="498" y="754" width="174" height="30"/>
  <text class="pill-text" x="526" y="774">artifacts/ci/*.json</text>
  <rect class="pill" x="686" y="754" width="204" height="30"/>
  <text class="pill-text" x="711" y="774">verification-contract.json</text>

  <rect class="panel" x="1022" y="216" width="520" height="616"/>
  <text class="section" x="1050" y="258">Meaning And Use</text>
  <text class="small" x="1050" y="284">The same contract is read by humans, CI jobs, and automation scripts.</text>

  <rect class="card" x="1048" y="320" width="468" height="148"/>
  <text class="label" x="1076" y="360">Status Semantics</text>
  <circle class="bullet" cx="1082" cy="392" r="4"/>
  <text class="body" x="1096" y="398">pass = checks are clean</text>
  <circle class="bullet" cx="1082" cy="422" r="4"/>
  <text class="body" x="1096" y="428">warning = usable, but review is still required</text>
  <circle class="bullet" cx="1082" cy="452" r="4"/>
  <text class="body" x="1096" y="458">failed = hard stop, non-zero exit, release should pause</text>

  <rect class="card" x="1048" y="496" width="468" height="152"/>
  <text class="label" x="1076" y="536">Why This Matters</text>
  <text class="body" x="1076" y="572">One contract means local validation, CI evidence, and follow-up tools</text>
  <text class="body" x="1076" y="598">all interpret the same result instead of scraping plain logs differently.</text>
  <text class="body" x="1076" y="624">That reduces release drift and makes operator triage more predictable.</text>

  <rect class="card" x="1048" y="676" width="468" height="118"/>
  <text class="label" x="1076" y="716">Current Limitation</text>
  <text class="body" x="1076" y="752">Live agent execution and watcher readiness still depend on runtime state,</text>
  <text class="body" x="1076" y="778">not only on repo-local checks.</text>

  <path class="line" d="M394 364 C430 364, 438 380, 498 398"/>
  <path class="line" d="M394 474 C430 474, 438 468, 498 470"/>
  <path class="line" d="M394 584 C430 584, 438 554, 498 542"/>
  <path class="line" d="M394 694 C430 694, 438 628, 498 614"/>
  <path class="line-hot" d="M394 784 C430 784, 438 704, 498 686"/>
  <path class="line-hot" d="M942 496 C980 496, 990 396, 1048 396"/>
  <path class="line-hot" d="M942 620 C980 620, 990 572, 1048 572"/>
  <path class="line-hot" d="M942 716 C980 716, 990 736, 1048 736"/>

  <text class="small" x="70" y="866">Designed to match the repository's dark documentation style and to sit next to the GitHub-renderable Mermaid map.</text>
</svg>
