<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>SCUM TH Platform | เจ้าของระบบ</title>
  <link rel="stylesheet" href="/admin/assets/control-plane-shell-v4.css?v=20260327-ui-8">
  <link rel="stylesheet" href="/admin/assets/owner-dashboard-v4.css?v=20260327-ui-8">
  <link rel="stylesheet" href="/admin/assets/owner-tenants-v4.css?v=20260327-ui-8">
  <link rel="stylesheet" href="/admin/assets/owner-runtime-health-v4.css?v=20260327-ui-8">
</head>
<body class="surface-body surface-owner" data-surface="owner-v4">
  <div class="surface-app">
    <header class="surface-globalbar">
      <div class="surface-globalbar-main">
        <a class="surface-brand" href="/owner">
          <span class="surface-brand-mark">SCUM</span>
          <span class="surface-brand-copy">
            <span class="surface-brand-eyebrow" data-i18n="shell.owner.eyebrow">Owner Panel</span>
            <strong class="surface-brand-title" data-i18n="shell.owner.title">ศูนย์ควบคุมแพลตฟอร์ม</strong>
            <span class="surface-brand-detail" data-i18n="shell.owner.detail">ดูผู้เช่า แพ็กเกจ รายได้ สุขภาพระบบ และเหตุการณ์จากจุดเดียว</span>
          </span>
        </a>
        <nav class="surface-role-switch" aria-label="Surface switch">
          <a class="surface-role-link is-active" href="/owner" data-i18n="shell.role.owner">เจ้าของระบบ</a>
          <a class="surface-role-link" href="/tenant" data-i18n="shell.role.tenant">ผู้เช่า</a>
          <a class="surface-role-link" href="http://127.0.0.1:3300/player/login" data-i18n="shell.role.player">ผู้เล่น</a>
        </nav>
      </div>
      <div class="surface-globalbar-tools">
        <span id="ownerV4Status" class="surface-status" data-tone="muted" data-i18n="shell.owner.status.loading">กำลังเตรียมหน้าเจ้าของระบบ</span>
        <div class="surface-tool-cluster">
          <a class="surface-button" href="/tenant" data-i18n="shell.owner.openTenant">เปิดพื้นที่ผู้เช่า</a>
          <button id="ownerV4RefreshBtn" class="surface-button surface-button-primary" type="button" data-i18n="shell.common.refresh">รีเฟรชข้อมูล</button>
        </div>
      </div>
    </header>
    <main class="surface-stage">
      <div id="ownerV4AppRoot" class="surface-mount" aria-live="polite"></div>
    </main>
  </div>
  <script src="/admin/assets/admin-i18n.js?v=20260327-ui-8"></script>
  <script>
    window.AdminUiI18n?.init();
    const applyOwnerShellLocale = () => {
      if (!window.AdminUiI18n) return;
      document.title = window.AdminUiI18n.t('shell.owner.documentTitle', document.title);
      window.AdminUiI18n.apply(document);
    };
    applyOwnerShellLocale();
    window.addEventListener('ui-language-change', applyOwnerShellLocale);
  </script>
  <script src="/admin/assets/owner-dashboard-v4.js?v=20260327-ui-8"></script>
  <script src="/admin/assets/owner-tenants-v4.js?v=20260327-ui-8"></script>
  <script src="/admin/assets/owner-runtime-health-v4.js?v=20260327-ui-8"></script>
  <script src="/admin/assets/owner-v4-app.js?v=20260327-ui-8"></script>
</body>
</html>
