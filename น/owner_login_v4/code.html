<style>
        body { font-family: 'Inter', sans-serif; }
        .font-headline { font-family: 'Public Sans', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-surface-dim text-on-surface selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col items-center justify-center overflow-hidden">
<!-- Background Texture -->
<div class="fixed inset-0 bg-noise pointer-events-none"></div>
<div class="fixed inset-0 bg-gradient-to-tr from-surface-dim via-surface-container-lowest to-surface-dim opacity-90 z-[-1]"></div>
<!-- Header / Nav (Minimalist for Login) -->
<header class="fixed top-0 w-full z-50 bg-zinc-950/90 backdrop-blur-md border-b border-zinc-800 h-14 px-6 flex justify-between items-center">
<div class="text-lg font-black text-cyan-400 tracking-widest uppercase font-headline">SCUM CONTROL PLANE</div>
<div class="flex items-center gap-6">
<div class="flex items-center gap-2 px-3 py-1 rounded border border-zinc-800 bg-zinc-900/50">
<span class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.6)]"></span>
<span class="text-[10px] font-bold tracking-tighter text-zinc-400 font-headline">SYSTEM ONLINE</span>
</div>
<div class="flex items-center gap-4 text-zinc-500 font-headline text-sm font-semibold uppercase">
<button class="hover:text-cyan-400 transition-colors cursor-pointer">EN</button>
<div class="w-[1px] h-3 bg-zinc-800"></div>
<button class="hover:text-cyan-400 transition-colors cursor-pointer">TH</button>
<button class="material-symbols-outlined text-lg hover:text-cyan-400 ml-2 cursor-pointer" data-icon="dark_mode">dark_mode</button>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-md px-6 flex flex-col gap-8">
<!-- Brand Hero -->
<div class="text-center space-y-2">
<div class="inline-flex items-center justify-center w-20 h-20 mb-6 bg-zinc-900 border border-zinc-800 rounded-lg shadow-2xl relative overflow-hidden group">
<div class="absolute inset-0 bg-cyan-400/5 group-hover:bg-cyan-400/10 transition-colors"></div>
<span class="material-symbols-outlined text-4xl text-cyan-400" data-icon="security" style="font-variation-settings: 'FILL' 1;">security</span>
</div>
<h1 class="text-2xl font-black font-headline tracking-tight text-white uppercase">Operator Access</h1>
<p class="text-zinc-500 text-sm font-medium tracking-wide">ENTER CREDENTIALS TO INITIALIZE UPLINK</p>
</div>
<!-- Login Card -->
<div class="bg-zinc-900/40 backdrop-blur-sm border border-zinc-800 p-8 rounded shadow-2xl space-y-6 relative group overflow-hidden">
<!-- Decorative Accent -->
<div class="absolute top-0 left-0 w-1 h-full bg-cyan-400/20 group-hover:bg-cyan-400 transition-colors duration-500"></div>
<form class="space-y-5">
<!-- Field: Identifier -->
<div class="space-y-2">
<label class="block text-[10px] font-bold text-zinc-500 uppercase tracking-widest font-headline">Username or Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-zinc-600 text-lg" data-icon="alternate_email">alternate_email</span>
<input class="w-full bg-zinc-950 border border-zinc-800 rounded px-10 py-3 text-sm text-cyan-50 placeholder:text-zinc-700 focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400/20 transition-all font-body" placeholder="OPERATOR_ID" type="text"/>
</div>
</div>
<!-- Field: Passphrase -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-[10px] font-bold text-zinc-500 uppercase tracking-widest font-headline">Secure Passphrase</label>
<a class="text-[10px] font-bold text-zinc-600 hover:text-cyan-400 uppercase tracking-widest font-headline transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-zinc-600 text-lg" data-icon="lock">lock</span>
<input class="w-full bg-zinc-950 border border-zinc-800 rounded px-10 py-3 text-sm text-cyan-50 placeholder:text-zinc-700 focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400/20 transition-all font-body" placeholder="••••••••••••" type="password"/>
<button class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-zinc-600 hover:text-zinc-400 transition-colors cursor-pointer" data-icon="visibility" type="button">visibility</button>
</div>
</div>
<!-- Remember Toggle -->
<div class="flex items-center gap-3">
<input class="w-4 h-4 rounded border-zinc-800 bg-zinc-950 text-cyan-400 focus:ring-cyan-400 focus:ring-offset-zinc-900" id="persist" type="checkbox"/>
<label class="text-xs font-medium text-zinc-500 cursor-pointer" for="persist">Persist Session</label>
</div>
<!-- Action: Sign In -->
<button class="w-full bg-cyan-500 hover:bg-cyan-400 active:scale-95 transition-all text-zinc-950 font-black font-headline text-sm py-4 rounded uppercase tracking-widest shadow-[0_0_20px_rgba(6,182,212,0.15)] hover:shadow-[0_0_25px_rgba(6,182,212,0.3)] flex items-center justify-center gap-2 group" type="submit">
<span>Initialize Link</span>
<span class="material-symbols-outlined text-lg font-bold group-hover:translate-x-1 transition-transform" data-icon="login">login</span>
</button>
</form>
</div>
<!-- Fleet Stats Strip -->
<div class="grid grid-cols-3 gap-2">
<div class="bg-zinc-900/50 border border-zinc-800 p-3 rounded text-center">
<div class="text-[10px] text-zinc-600 font-bold font-headline uppercase">Fleet Ready</div>
<div class="text-lg font-black text-zinc-400 font-headline">99.8%</div>
</div>
<div class="bg-zinc-900/50 border border-zinc-800 p-3 rounded text-center">
<div class="text-[10px] text-zinc-600 font-bold font-headline uppercase">Active Agents</div>
<div class="text-lg font-black text-zinc-400 font-headline">1,402</div>
</div>
<div class="bg-zinc-900/50 border border-zinc-800 p-3 rounded text-center">
<div class="text-[10px] text-zinc-600 font-bold font-headline uppercase">Security Level</div>
<div class="text-lg font-black text-zinc-400 font-headline uppercase">ROOT</div>
</div>
</div>
<!-- Footer Cues -->
<div class="flex justify-between items-center text-[10px] font-bold text-zinc-700 uppercase tracking-widest px-1">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[14px]" data-icon="dns">dns</span>
<span>SECURE-NODE-017</span>
</div>
<div class="flex items-center gap-2">
<span>V2.4.9-STABLE</span>
<span class="material-symbols-outlined text-[14px]" data-icon="verified">verified</span>
</div>
</div>
</main>
<!-- Side Decoration (Tactical Aesthetic) -->
<div class="fixed right-0 bottom-0 p-12 opacity-5 pointer-events-none">
<span class="material-symbols-outlined text-[240px]" data-icon="radar">radar</span>
</div>
<div class="fixed left-0 top-0 p-12 opacity-5 pointer-events-none">
<span class="material-symbols-outlined text-[240px]" data-icon="terminal">terminal</span>
</div>
<!-- Bottom Action Bar (Contextual/Tactical) -->
<div class="fixed bottom-0 w-full h-1 bg-zinc-900">
<div class="h-full bg-cyan-400 w-1/3 shadow-[0_0_10px_rgba(6,182,212,0.8)]"></div>
</div>
