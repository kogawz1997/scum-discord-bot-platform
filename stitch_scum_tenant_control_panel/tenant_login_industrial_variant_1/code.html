            background-image: radial-gradient(#353534 1px, transparent 1px);

<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center p-4 md:p-8 bento-texture">
<!-- Top Navigation Suppressed for Login focused journey -->
<main class="w-full max-w-xl flex flex-col gap-0 z-10">
<!-- Header Section -->
<header class="bg-surface-container border-t-4 border-l-4 border-r-4 border-surface-container-highest p-6 flex flex-col md:flex-row justify-between items-end md:items-center gap-4">
<div class="flex flex-col">
<h1 class="font-headline text-3xl font-black tracking-tighter text-primary-container leading-none">
                    SCUM COMMAND
                </h1>
<p class="font-label text-[10px] tracking-widest text-outline uppercase mt-1">
                    Industrial System Access Protocol v4.02
                </p>
</div>
<div class="flex items-center gap-2 bg-surface-container-lowest px-3 py-2 border-2 border-surface-container-highest">
<span class="w-2 h-2 bg-secondary animate-pulse"></span>
<span class="font-body text-xs font-bold tracking-tighter">SECURE NODE: BASTION_07</span>
</div>
</header>
<!-- Main Auth Module -->
<div class="bg-surface-container border-4 border-surface-container-highest p-8 md:p-12">
<div class="mb-10 border-l-4 border-primary-container pl-6">
<h2 class="font-headline text-2xl font-bold uppercase tracking-tight">
                    Authentication Required <br/>
<span class="text-primary-container">กรุณายืนยันตัวตน</span>
</h2>
</div>
<form class="space-y-8">
<!-- Tenant ID Input -->
<div class="flex flex-col gap-2">
<label class="font-label text-xs font-black uppercase tracking-widest text-outline flex justify-between">
<span>Tenant Identifier / รหัสองค์กร</span>
<span class="text-surface-container-highest">[REQ_ALPHA]</span>
</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-0 border-b-2 border-surface-container-highest focus:border-primary-container focus:ring-0 text-on-surface font-body py-4 px-0 placeholder:text-surface-container-highest transition-all" placeholder="TNT-000-00" type="text"/>
<span class="absolute right-0 bottom-3 material-symbols-outlined text-surface-container-highest">corporate_fare</span>
</div>
</div>
<!-- Username Input -->
<div class="flex flex-col gap-2">
<label class="font-label text-xs font-black uppercase tracking-widest text-outline flex justify-between">
<span>Operator Username / ชื่อผู้ใช้</span>
<span class="text-surface-container-highest">[REQ_BETA]</span>
</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-0 border-b-2 border-surface-container-highest focus:border-primary-container focus:ring-0 text-on-surface font-body py-4 px-0 placeholder:text-surface-container-highest transition-all" placeholder="CMD_OPERATOR" type="text"/>
<span class="absolute right-0 bottom-3 material-symbols-outlined text-surface-container-highest">person</span>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<label class="font-label text-xs font-black uppercase tracking-widest text-outline flex justify-between">
<span>Security Key / รหัสผ่าน</span>
<span class="text-surface-container-highest">[REQ_GAMMA]</span>
</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-0 border-b-2 border-surface-container-highest focus:border-primary-container focus:ring-0 text-on-surface font-body py-4 px-0 placeholder:text-surface-container-highest transition-all" placeholder="••••••••••••" type="password"/>
<span class="absolute right-0 bottom-3 material-symbols-outlined text-surface-container-highest">lock</span>
</div>
</div>
<!-- Primary Action -->
<div class="pt-4">
<button class="w-full bg-primary-container text-on-primary-container font-headline font-black text-xl py-5 border-2 border-primary-container hover:border-4 transition-all flex items-center justify-center gap-4 group" type="submit">
                        AUTHENTICATE
                        <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">login</span>
</button>
<p class="text-center font-label text-[10px] text-surface-container-highest mt-3 tracking-widest">
                        BY CLICKING YOU AGREE TO SECTOR PROTOCOL 49-B
                    </p>
</div>
</form>
</div>
<!-- Footer / Utility Links -->
<footer class="bg-surface-container-low border-b-4 border-l-4 border-r-4 border-surface-container-highest p-6 grid grid-cols-2 gap-4">
<a class="group flex flex-col gap-1 border-r-2 border-surface-container-highest pr-4" href="#">
<span class="font-headline text-[10px] font-bold text-outline uppercase tracking-tighter">Forgotten Key?</span>
<span class="font-body text-sm font-bold text-on-surface group-hover:text-primary-container transition-colors">Recover Access</span>
</a>
<a class="group flex flex-col gap-1 pl-4" href="#">
<span class="font-headline text-[10px] font-bold text-outline uppercase tracking-tighter">New Personnel?</span>
<span class="font-body text-sm font-bold text-on-surface group-hover:text-primary-container transition-colors">Request Terminal Access</span>
</a>
</footer>
</main>
<!-- Branding Watermark -->
<div class="fixed bottom-8 right-8 pointer-events-none opacity-20 hidden lg:block">
<h3 class="font-headline text-8xl font-black text-surface-container-highest leading-none tracking-tighter uppercase select-none">
            BASTION
        </h3>
</div>
<!-- Status Bar (Bunker HUD style) -->
<div class="fixed top-0 left-0 w-full h-1 bg-surface-container-highest">
<div class="h-full bg-primary-container w-1/3"></div>
</div>
<!-- Background Decorative Element -->
<div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
<div class="absolute -top-24 -left-24 w-96 h-96 border-[32px] border-surface-container-highest opacity-10"></div>
<div class="absolute top-1/2 left-10 w-px h-64 bg-surface-container-highest opacity-20"></div>
<div class="absolute top-1/2 left-8 w-px h-64 bg-surface-container-highest opacity-20"></div>
