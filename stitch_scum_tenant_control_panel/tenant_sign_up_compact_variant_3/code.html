<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&amp;family=Public+Sans:ital,wght@0,100..900;1,100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed": "#410002",
                        "surface-container-low": "#1c1b1b",
                        "on-primary": "#552100",
                        "inverse-on-surface": "#313030",
                        "on-secondary-fixed": "#0f2000",
                        "secondary": "#a0d663",
                        "tertiary-fixed-dim": "#ffb4ab",
                        "on-surface-variant": "#e0c0b1",
                        "surface-variant": "#353534",
                        "primary-fixed-dim": "#ffb690",
                        "surface-bright": "#393939",
                        "inverse-primary": "#9d4300",
                        "surface-dim": "#131313",
                        "outline": "#a78b7d",
                        "on-tertiary-container": "#6c0005",
                        "on-tertiary-fixed-variant": "#93000b",
                        "primary-container": "#f97316",
                        "on-secondary-fixed-variant": "#2e4f00",
                        "surface": "#131313",
                        "secondary-fixed-dim": "#a0d663",
                        "outline-variant": "#584237",
                        "error": "#ffb4ab",
                        "tertiary-fixed": "#ffdad6",
                        "on-primary-fixed-variant": "#783200",
                        "tertiary": "#ffb4ab",
                        "primary-fixed": "#ffdbca",
                        "on-primary-fixed": "#341100",
                        "background": "#131313",
                        "surface-container": "#201f1f",
                        "surface-tint": "#ffb690",
                        "secondary-fixed": "#bbf37c",
                        "on-surface": "#e5e2e1",
                        "surface-container-high": "#2a2a2a",
                        "error-container": "#93000a",
                        "primary": "#ffb690",
                        "on-tertiary": "#690005",
                        "tertiary-container": "#ff6a5d",
                        "on-error": "#690005",
                        "on-primary-container": "#582200",
                        "on-background": "#e5e2e1",
                        "on-secondary-container": "#bdf57d",
                        "on-error-container": "#ffdad6",
                        "on-secondary": "#1e3700",
                        "inverse-surface": "#e5e2e1",
                        "surface-container-highest": "#353534",
                        "secondary-container": "#447200",
                        "surface-container-lowest": "#0e0e0e"
                    },
                    "borderRadius": {
                        "DEFAULT": "0px",
                        "lg": "0px",
                        "xl": "0px",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Space Grotesk"],
                        "body": ["Public Sans"],
                        "label": ["Public Sans"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #131313;
            color: #e5e2e1;
            font-family: 'Public Sans', sans-serif;
        }
        .bunker-border {
            border: 2px solid #353534;
        }
        .bunker-border-heavy {
            border: 4px solid #353534;
        }
        .structural-accent {
            border-left: 4px solid #f97316;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
<!-- TopNavBar Suppression Check: Login/Sign-up/Onboarding suppresses main nav -->
<header class="w-full bg-[#131313] border-b-4 border-[#201f1f] flex justify-between items-center px-6 py-4">
<div class="text-2xl font-bold tracking-tighter text-orange-600 font-['Space_Grotesk'] uppercase tracking-wider">
            SCUM COMMAND
        </div>
<div class="flex gap-4">
<span class="material-symbols-outlined text-orange-600" data-icon="help">help</span>
</div>
</header>
<main class="flex-grow flex items-center justify-center p-4 sm:p-8">
<!-- Compact Sign-up Container -->
<div class="w-full max-w-md bg-[#201f1f] bunker-border-heavy p-0 overflow-hidden">
<!-- Header Section -->
<div class="bg-[#353534] p-6 structural-accent">
<h1 class="font-headline font-bold text-2xl text-on-surface tracking-wider uppercase mb-1">
                    NEW RECRUIT REGISTRATION
                </h1>
<p class="font-body text-xs text-outline uppercase tracking-widest">
                    ลงทะเบียนเจ้าหน้าที่ใหม่ • SYSTEM ACCESS PROTOCOL 01
                </p>
</div>
<!-- Progress Indicators -->
<div class="flex w-full h-2 bg-surface-container-lowest">
<div class="w-1/3 bg-primary-container"></div>
<div class="w-2/3 bg-surface-container-lowest"></div>
</div>
<!-- Form Content -->
<form class="p-8 space-y-6">
<!-- Identity Group -->
<div class="space-y-4">
<div>
<label class="block font-label text-[10px] text-outline uppercase tracking-tighter mb-2">
                            IDENTIFICATION NAME / ชื่อ-นามสกุล
                        </label>
<input class="w-full bg-surface-container-lowest border-b-2 border-outline focus:border-primary-container text-on-surface px-4 py-3 outline-none transition-all placeholder:text-surface-variant font-body text-sm uppercase" placeholder="RECRUIT NAME" type="text"/>
</div>
<div>
<label class="block font-label text-[10px] text-outline uppercase tracking-tighter mb-2">
                            COMMUNICATION UPLINK / อีเมล
                        </label>
<input class="w-full bg-surface-container-lowest border-b-2 border-outline focus:border-primary-container text-on-surface px-4 py-3 outline-none transition-all placeholder:text-surface-variant font-body text-sm uppercase" placeholder="OPERATOR@SCUM.SYSTEM" type="email"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div>
<label class="block font-label text-[10px] text-outline uppercase tracking-tighter mb-2">
                                SECURITY KEY / รหัสผ่าน
                            </label>
<input class="w-full bg-surface-container-lowest border-b-2 border-outline focus:border-primary-container text-on-surface px-4 py-3 outline-none transition-all placeholder:text-surface-variant font-body text-sm" placeholder="••••••••" type="password"/>
</div>
<div>
<label class="block font-label text-[10px] text-outline uppercase tracking-tighter mb-2">
                                CONFIRM KEY / ยืนยันรหัส
                            </label>
<input class="w-full bg-surface-container-lowest border-b-2 border-outline focus:border-primary-container text-on-surface px-4 py-3 outline-none transition-all placeholder:text-surface-variant font-body text-sm" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<!-- Sector Authorization (Bento Grid Style for Selection) -->
<div class="space-y-3">
<label class="block font-label text-[10px] text-outline uppercase tracking-tighter">
                        ASSIGNED SECTOR / ภาคส่วนที่ได้รับมอบหมาย
                    </label>
<div class="grid grid-cols-2 gap-2">
<button class="border-2 border-primary-container bg-primary-container/10 p-3 text-left" type="button">
<span class="block font-headline text-xs font-bold text-primary-container">SECTOR-01</span>
<span class="block font-body text-[10px] text-on-surface opacity-70">LOGISTICS HUB</span>
</button>
<button class="border-2 border-outline-variant p-3 text-left hover:border-outline transition-colors" type="button">
<span class="block font-headline text-xs font-bold text-outline">SECTOR-02</span>
<span class="block font-body text-[10px] text-outline opacity-70">DEFENSE GRID</span>
</button>
</div>
</div>
<!-- Terms -->
<div class="flex items-start gap-3">
<input class="mt-1 bg-surface-container-lowest border-2 border-outline text-primary-container focus:ring-0 w-4 h-4 rounded-none" type="checkbox"/>
<label class="font-body text-[10px] text-outline leading-relaxed uppercase">
                        I acknowledge the terms of the <span class="text-on-surface underline">Bastion Protocol</span> and authorize data collection. / ข้าพเจ้ายอมรับเงื่อนไขการใช้งาน
                    </label>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary-container text-on-primary-container font-headline font-black py-4 border-2 border-primary-container hover:border-4 active:scale-95 transition-all uppercase tracking-widest flex items-center justify-center gap-2" type="submit">
<span>CREATE ACCOUNT</span>
<span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Footer Meta -->
<div class="bg-surface-container-lowest p-4 flex flex-col items-center gap-2">
<p class="font-body text-[10px] text-outline-variant uppercase">
                    Already operational? <a class="text-primary-container font-bold hover:underline" href="#">RE-AUTHENTICATE</a>
</p>
<div class="h-px w-8 bg-surface-variant"></div>
<a class="font-body text-[9px] text-surface-variant hover:text-outline flex items-center gap-1 uppercase" href="#">
<span class="material-symbols-outlined text-[12px]" data-icon="description">description</span>
                    Technical Support Documentation
                </a>
</div>
</div>
</main>
<!-- Footer from Shared Components -->
<footer class="w-full py-4 px-8 flex justify-between items-center bg-[#131313] border-t-2 border-[#201f1f]">
<div class="font-['Public_Sans'] text-[10px] uppercase text-orange-700">
            © 2024 SCUM INDUSTRIAL SYSTEMS. UNAUTHORIZED ACCESS PROHIBITED.
        </div>
<div class="flex gap-4">
<a class="font-['Public_Sans'] text-[10px] uppercase text-gray-600 hover:text-orange-400" href="#">Security Policy</a>
<a class="font-['Public_Sans'] text-[10px] uppercase text-gray-600 hover:text-orange-400" href="#">Terminal Docs</a>
<a class="font-['Public_Sans'] text-[10px] uppercase text-gray-600 hover:text-orange-400" href="#">Contact High Command</a>
</div>
</footer>
</body></html>
