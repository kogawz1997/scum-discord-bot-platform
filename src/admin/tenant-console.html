<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>SCUM TH Platform | ผู้เช่า</title>
  <link rel="stylesheet" href="/admin/assets/control-plane-shell-v4.css?v=20260327-ui-8">
  <link rel="stylesheet" href="/admin/assets/tenant-dashboard-v4.css?v=20260327-ui-8">
  <link rel="stylesheet" href="/admin/assets/tenant-server-status-v4.css?v=20260327-ui-8">
  <link rel="stylesheet" href="/admin/assets/tenant-server-config-v4.css?v=20260327-ui-8">
  <link rel="stylesheet" href="/admin/assets/tenant-orders-v4.css?v=20260327-ui-8">
  <link rel="stylesheet" href="/admin/assets/tenant-players-v4.css?v=20260327-ui-8">
  <link rel="stylesheet" href="/admin/assets/tenant-delivery-agents-v4.css?v=20260327-ui-8">
  <link rel="stylesheet" href="/admin/assets/tenant-server-bots-v4.css?v=20260327-ui-8">
  <link rel="stylesheet" href="/admin/assets/tenant-restart-control-v4.css?v=20260327-ui-8">
</head>
<body class="surface-body surface-tenant" data-surface="tenant-v4">
  <div class="surface-app">
    <header class="surface-globalbar">
      <div class="surface-globalbar-main">
        <a class="surface-brand" href="/tenant">
          <span class="surface-brand-mark">SCUM</span>
          <span class="surface-brand-copy">
            <span class="surface-brand-eyebrow" data-i18n="shell.tenant.eyebrow">Tenant Admin</span>
            <strong class="surface-brand-title" data-i18n="shell.tenant.title">แผงดูแลเซิร์ฟเวอร์</strong>
            <span class="surface-brand-detail" data-i18n="shell.tenant.detail">ดูแลเซิร์ฟเวอร์ คำสั่งซื้อ ผู้เล่น การส่งของ และบอตของชุมชนนี้</span>
          </span>
        </a>
        <nav class="surface-role-switch" aria-label="Surface switch">
          <a class="surface-role-link is-active" href="/tenant" data-i18n="shell.role.tenant">ผู้เช่า</a>
          <a class="surface-role-link" href="http://127.0.0.1:3300/player/login" data-i18n="shell.role.player">ผู้เล่น</a>
        </nav>
      </div>
      <div class="surface-globalbar-tools">
        <div id="tenantOwnerScopeWrap" class="surface-select-wrap surface-tenant-scope" hidden>
          <span class="surface-select-label" data-i18n="shell.tenant.scopeLabel">ผู้เช่า</span>
          <div class="surface-combobox" data-state="closed">
            <button
              id="tenantOwnerScopeButton"
              class="surface-select surface-combobox-trigger"
              type="button"
              aria-haspopup="listbox"
              aria-expanded="false"
              aria-controls="tenantOwnerScopeMenu"
            >
              <span id="tenantOwnerScopeValue" class="surface-combobox-value" data-i18n="shell.tenant.scopePlaceholder">เลือกผู้เช่า</span>
            </button>
            <div id="tenantOwnerScopeMenu" class="surface-combobox-menu" role="listbox" hidden></div>
          </div>
          <select id="tenantOwnerScopeSelect" class="surface-select surface-select-native" aria-label="เลือกผู้เช่า" tabindex="-1" aria-hidden="true"></select>
        </div>
        <span id="tenantV4Status" class="surface-status" data-tone="muted" data-i18n="shell.tenant.status.loading">กำลังเตรียมพื้นที่ผู้เช่า</span>
        <button id="tenantV4RefreshBtn" class="surface-button surface-button-primary" type="button" data-i18n="shell.common.refresh">รีเฟรชข้อมูล</button>
      </div>
    </header>
    <main class="surface-stage">
      <div id="tenantV4AppRoot" class="surface-mount" aria-live="polite"></div>
    </main>
  </div>
  <script src="/admin/assets/admin-i18n.js?v=20260327-ui-8"></script>
  <script>
    window.AdminUiI18n?.init();
    const applyTenantShellLocale = () => {
      if (!window.AdminUiI18n) return;
      document.title = window.AdminUiI18n.t('shell.tenant.documentTitle', document.title);
      window.AdminUiI18n.apply(document);
    };
    applyTenantShellLocale();
    window.addEventListener('ui-language-change', applyTenantShellLocale);
  </script>
  <script src="/admin/assets/tenant-dashboard-v4.js?v=20260327-ui-8"></script>
  <script src="/admin/assets/tenant-server-status-v4.js?v=20260327-ui-8"></script>
  <script src="/admin/assets/tenant-server-config-v4.js?v=20260327-ui-8"></script>
  <script src="/admin/assets/tenant-orders-v4.js?v=20260327-ui-8"></script>
  <script src="/admin/assets/tenant-players-v4.js?v=20260327-ui-8"></script>
  <script src="/admin/assets/tenant-delivery-agents-v4.js?v=20260327-ui-8"></script>
  <script src="/admin/assets/tenant-server-bots-v4.js?v=20260327-ui-8"></script>
  <script src="/admin/assets/tenant-restart-control-v4.js?v=20260327-ui-8"></script>
  <script src="/admin/assets/tenant-v4-app.js?v=20260327-ui-8"></script>
</body>
</html>
