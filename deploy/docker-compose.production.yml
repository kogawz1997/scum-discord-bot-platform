name: scum-platform

services:
  migrate:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        APP_ROLE: migrate
    env_file:
      - ../.env
    environment:
      APP_ROLE: migrate
    restart: "no"

  bot:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        APP_ROLE: bot
    env_file:
      - ../.env
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      APP_ROLE: bot
      NODE_ENV: production
      BOT_HEALTH_HOST: 0.0.0.0
      BOT_HEALTH_PORT: 3210
      BOT_ENABLE_ADMIN_WEB: "true"
      BOT_ENABLE_SCUM_WEBHOOK: "true"
      BOT_ENABLE_RENTBIKE_SERVICE: "false"
      BOT_ENABLE_DELIVERY_WORKER: "false"
      PERSIST_REQUIRE_DB: "true"
      PERSIST_LEGACY_SNAPSHOTS: "false"
    ports:
      - "3200:3200"
      - "3100:3100"
      - "3210:3210"
    volumes:
      - ../prisma:/app/prisma
      - ../data:/app/data
      - ../logs:/app/logs
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        APP_ROLE: worker
    env_file:
      - ../.env
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      APP_ROLE: worker
      NODE_ENV: production
      WORKER_HEALTH_HOST: 0.0.0.0
      WORKER_HEALTH_PORT: 3211
      WORKER_ENABLE_RENTBIKE: "true"
      WORKER_ENABLE_DELIVERY: "true"
      PERSIST_REQUIRE_DB: "true"
      PERSIST_LEGACY_SNAPSHOTS: "false"
    ports:
      - "3211:3211"
    volumes:
      - ../prisma:/app/prisma
      - ../data:/app/data
      - ../logs:/app/logs
    restart: unless-stopped

  watcher:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        APP_ROLE: watcher
    env_file:
      - ../.env
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      APP_ROLE: watcher
      NODE_ENV: production
      PERSIST_REQUIRE_DB: "true"
      PERSIST_LEGACY_SNAPSHOTS: "false"
      SCUM_WATCHER_HEALTH_HOST: 0.0.0.0
      SCUM_WATCHER_HEALTH_PORT: 3212
    ports:
      - "3212:3212"
    volumes:
      - ../prisma:/app/prisma
      - ../data:/app/data
      - ../logs:/app/logs
    restart: unless-stopped

  console-agent:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        APP_ROLE: console-agent
    env_file:
      - ../.env
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      APP_ROLE: console-agent
      NODE_ENV: production
      SCUM_CONSOLE_AGENT_HOST: 0.0.0.0
      SCUM_CONSOLE_AGENT_PORT: 3213
    ports:
      - "3213:3213"
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        APP_ROLE: web
    env_file:
      - ../.env
      - ../apps/web-portal-standalone/.env
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      APP_ROLE: web
      NODE_ENV: production
      PERSIST_REQUIRE_DB: "true"
      PERSIST_LEGACY_SNAPSHOTS: "false"
      WEB_PORTAL_HOST: 0.0.0.0
      WEB_PORTAL_PORT: 3300
      WEB_PORTAL_MODE: player
    ports:
      - "3300:3300"
    volumes:
      - ../prisma:/app/prisma
      - ../data:/app/data
      - ../logs:/app/logs
    restart: unless-stopped
